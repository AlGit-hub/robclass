<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacroBot Lab | Arduino y Controladores</title>
  <link rel="icon" type="image/png" href="./robot.png">
  <style>
    :root {
      --ink: #142033;
      --text: #3f4b5f;
      --muted: #6c7a91;
      --line: #dce5ef;
      --paper: #ffffff;
      --soft: #f4f8fb;
      --teal: #008f96;
      --teal-soft: #dff6f5;
      --blue: #3567d6;
      --blue-soft: #e7efff;
      --coral: #f05d45;
      --coral-soft: #ffe9e4;
      --green: #238b52;
      --green-soft: #e2f7eb;
      --yellow: #f0aa24;
      --yellow-soft: #fff4d8;
      --grape: #7257d8;
      --grape-soft: #eeeafd;
      --dark: #182235;
      --shadow: 0 18px 55px rgba(25, 38, 60, 0.12);
      --radius: 8px;
    }

    /* =========================================
   TEMA OSCURO
   ========================================= */
    [data-theme="dark"] {
      --ink: #f8fafc;
      --text: #cbd5e1;
      --muted: #94a3b8;
      --line: #334155;
      --paper: #0f172a;
      --soft: #1e293b;
      --dark: #020617;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.4);
    }

    [data-theme="dark"] .topbar,
    [data-theme="dark"] .footer-nav {
      background: rgba(15, 23, 42, 0.92);
    }

    [data-theme="dark"] .rule-card,
    [data-theme="dark"] .command-row {
      background: var(--paper);
    }

    [data-theme="dark"] body {
      background:
        linear-gradient(135deg, rgba(0, 143, 150, 0.06), transparent 32%),
        linear-gradient(235deg, rgba(240, 170, 36, 0.08), transparent 28%),
        var(--soft);
    }

    [data-theme="dark"] .panel,
    [data-theme="dark"] .stage-panel,
    [data-theme="dark"] .mission-card,
    [data-theme="dark"] .mini-card,
    [data-theme="dark"] .quiz-option,
    [data-theme="dark"] .component-card {
      background: var(--paper);
      border-color: var(--line);
    }

    [data-theme="dark"] .progress-ring span {
      background: var(--soft);
    }

    [data-theme="dark"] .ghost-btn,
    [data-theme="dark"] .text-btn,
    [data-theme="dark"] .pill,
    [data-theme="dark"] .icon-btn {
      background: var(--soft);
      border-color: var(--line);
      color: var(--text);
    }

    [data-theme="dark"] .route-btn {
      background: var(--paper);
      border-color: var(--line);
      color: var(--text);
    }

    [data-theme="dark"] .summary-row {
      background: var(--soft);
      border-color: var(--line);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(0, 143, 150, 0.08), transparent 32%),
        linear-gradient(235deg, rgba(240, 170, 36, 0.16), transparent 28%),
        var(--soft);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
    }

    code,
    pre {
      font-family: "Cascadia Mono", "Consolas", monospace;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: var(--teal);
      color: white;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(0, 143, 150, 0.22);
    }

    .brand-title {
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand-title span {
      color: var(--teal);
    }

    .brand-sub {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 700;
      margin-top: 2px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .icon-btn,
    .text-btn,
    .primary-btn,
    .ghost-btn {
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 850;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: inline-grid;
      place-items: center;
      background: var(--soft);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .text-btn,
    .ghost-btn,
    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
    }

    .primary-btn {
      color: white;
      background: var(--teal);
      box-shadow: 0 12px 25px rgba(0, 143, 150, 0.26);
    }

    .primary-btn:hover,
    .icon-btn:hover,
    .text-btn:hover,
    .ghost-btn:hover {
      transform: translateY(-1px);
    }

    .ghost-btn,
    .text-btn {
      background: var(--paper);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .text-btn.is-active {
      color: white;
      background: var(--dark);
      border-color: var(--dark);
    }

    .main-grid {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 22px 18px 26px;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 84px;
      display: grid;
      gap: 12px;
    }

    .panel,
    .stage-panel,
    .mission-card,
    .mini-card,
    .quiz-option,
    .component-card {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(25, 38, 60, 0.08);
    }

    .panel {
      padding: 14px;
    }

    .panel-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 900;
      text-transform: uppercase;
      margin: 0 0 10px;
    }

    .route-list {
      display: grid;
      gap: 8px;
    }

    .route-btn {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: 38px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      color: var(--text);
      cursor: pointer;
    }

    .route-btn.is-active {
      border-color: var(--teal);
      background: var(--teal-soft);
      color: var(--ink);
    }

    .route-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: white;
      font-weight: 900;
    }

    .route-title {
      display: block;
      font-weight: 900;
      line-height: 1.25;
    }

    .route-note {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .progress-ring {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 0.72rem;
      font-weight: 900;
      background: conic-gradient(var(--green) var(--pct), #e8eef5 0);
      color: var(--ink);
    }

    .progress-ring span {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: white;
    }

    .summary-list {
      display: grid;
      gap: 8px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 8px;
      align-items: start;
      padding: 9px;
      border-radius: var(--radius);
      background: var(--soft);
      border: 1px solid #e8eef5;
    }

    .summary-row strong {
      display: block;
      font-size: 0.86rem;
      margin-bottom: 2px;
    }

    .summary-row span {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .stage {
      min-width: 0;
    }

    .dashboard {
      display: grid;
      gap: 18px;
    }

    .welcome {
      min-height: 210px;
      padding: 24px;
      overflow: hidden;
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) 280px;
      gap: 20px;
      align-items: center;
      background:
        linear-gradient(135deg, rgba(0, 143, 150, 0.96), rgba(24, 34, 53, 0.98)),
        var(--dark);
      border-radius: var(--radius);
      color: white;
      box-shadow: var(--shadow);
    }

    .welcome h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .welcome p {
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      max-width: 58ch;
      line-height: 1.55;
      font-size: 1rem;
    }

    .route-strip {
      margin-top: 18px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .route-strip span {
      padding: 7px 10px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-weight: 850;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .board-hero {
      aspect-ratio: 1.2;
      min-height: 190px;
      border-radius: var(--radius);
      background: #0f6f75;
      border: 10px solid rgba(255, 255, 255, 0.18);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
      padding: 16px;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.18);
    }

    .chip,
    .pin-dot,
    .hero-led {
      border-radius: var(--radius);
    }

    .chip {
      grid-column: 2 / 5;
      grid-row: 2 / 4;
      background: #1e293b;
      box-shadow: inset 0 0 0 2px #34435a;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
    }

    .pin-dot {
      width: 15px;
      height: 15px;
      background: #d7b35a;
      align-self: center;
      justify-self: center;
    }

    .hero-led {
      width: 30px;
      height: 30px;
      background: var(--yellow);
      box-shadow: 0 0 22px rgba(240, 170, 36, 0.95);
      align-self: center;
      justify-self: center;
      animation: glow 1.25s infinite steps(2, end);
    }

    @keyframes glow {
      50% {
        opacity: 0.35;
        box-shadow: 0 0 6px rgba(240, 170, 36, 0.35);
      }
    }

    .mission-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .mission-card {
      padding: 16px;
      display: grid;
      gap: 14px;
      border-top: 5px solid var(--accent);
    }

    .mission-head {
      display: grid;
      grid-template-columns: 50px 1fr;
      gap: 12px;
      align-items: center;
    }

    .mission-icon {
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 900;
      font-size: 1.2rem;
    }

    .mission-card h2 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: 0;
    }

    .mission-card p {
      margin: 4px 0 0;
      color: var(--muted);
      line-height: 1.4;
    }

    .goal-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .goal-list li {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 8px;
      color: var(--text);
      line-height: 1.35;
      font-size: 0.93rem;
    }

    .goal-list li::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 5px;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .mission-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .mission-actions button {
      min-height: 44px;
      background: var(--soft);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 900;
    }

    .mission-actions button:first-child {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .stage-panel {
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .stage-top {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 6px 9px;
      border-radius: var(--radius);
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .stage-top h1 {
      margin: 0;
      font-size: clamp(1.65rem, 4vw, 2.5rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .stage-sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.45;
    }

    .step-meter {
      min-width: 132px;
      display: grid;
      justify-items: end;
      gap: 8px;
    }

    .step-count {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .meter-track {
      width: 132px;
      height: 9px;
      border-radius: 999px;
      background: #e8eef5;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: var(--width);
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .stage-body {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .coach {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: linear-gradient(90deg, var(--soft), white);
    }

    .coach-face {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--dark);
      color: white;
      font-weight: 900;
    }

    .coach strong {
      color: var(--ink);
    }

    .coach p {
      margin: 0;
      color: var(--text);
      line-height: 1.5;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(270px, 0.82fr);
      gap: 16px;
      align-items: stretch;
    }

    .mini-card {
      padding: 14px;
      box-shadow: none;
    }

    .mini-card h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .mini-card p {
      margin: 0;
      color: var(--text);
      line-height: 1.5;
    }

    .key-box {
      border-left: 5px solid var(--accent);
      background: var(--accent-soft);
      padding: 14px;
      border-radius: var(--radius);
    }

    .key-box h3 {
      margin: 0 0 6px;
    }

    .key-box p {
      margin: 0;
      color: var(--text);
      line-height: 1.5;
      font-weight: 700;
    }

    .comparison-grid,
    .rules-grid,
    .command-grid,
    .component-grid,
    .flow-grid {
      display: grid;
      gap: 12px;
    }

    .comparison-grid,
    .rules-grid,
    .component-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .flow-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: stretch;
    }

    /* FIX: Cuando flow-grid está dentro del panel lateral de ayudas, se apila verticalmente para dar espacio al texto */
    .visual-board .flow-grid {
      grid-template-columns: 1fr !important;
      gap: 8px;
    }

    .compare-box {
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--soft);
    }

    .compare-box code {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 8px;
      border-radius: var(--radius);
      background: white;
      color: var(--blue);
      font-weight: 900;
    }

    .compare-box h3 {
      margin: 0 0 6px;
    }

    .compare-box p {
      margin: 0;
      color: var(--text);
      line-height: 1.45;
    }

    .rule-card {
      min-height: 138px;
      position: relative;
      padding: 14px;
      border-radius: var(--radius);
      background: white;
      border: 1px solid var(--line);
      cursor: pointer;
      text-align: left;
    }

    .rule-symbol {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--yellow-soft);
      color: #9a6400;
      font-weight: 950;
      margin-bottom: 10px;
    }

    .rule-card h3 {
      margin: 0 0 5px;
    }

    .rule-card p {
      margin: 0;
      color: var(--text);
      line-height: 1.4;
      font-size: 0.92rem;
    }

    .command-grid {
      grid-template-columns: 1fr;
    }

    .command-row {
      display: grid;
      grid-template-columns: minmax(180px, 0.55fr) 1fr;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      background: white;
      border-radius: var(--radius);
      align-items: center;
    }

    .command-row code {
      color: var(--blue);
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .command-row span {
      color: var(--text);
      line-height: 1.4;
    }

    .code-tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .code-block {
      border-radius: var(--radius);
      background: #0f172a;
      color: #d5e2f3;
      padding: 16px;
      overflow: auto;
      min-height: 310px;
      line-height: 1.65;
      font-size: 0.92rem;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .code-block .comment {
      color: #88a1bd;
    }

    .code-block .keyword {
      color: #f3a3c7;
    }

    .code-block .fn {
      color: #7dd3fc;
    }

    .code-block .value {
      color: #f6c177;
    }

    .visual-board,
    .protoboard,
    .led-demo,
    .brain-map,
    .blink-lab,
    .sequence-lab {
      min-height: 310px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: white;
      display: grid;
      place-items: center;
      padding: 16px;
      overflow: hidden;
    }

    .arduino-visual {
      width: min(340px, 100%);
      aspect-ratio: 1.35;
      border-radius: var(--radius);
      background: #078b90;
      position: relative;
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.24), 0 18px 34px rgba(0, 143, 150, 0.16);
    }

    .arduino-visual::before {
      content: "";
      position: absolute;
      inset: 32% 25%;
      background: #172033;
      border-radius: var(--radius);
      box-shadow: inset 0 0 0 2px #334155;
    }

    .arduino-visual::after {
      content: "ARDUINO";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      font-size: 1rem;
      font-weight: 950;
    }

    .socket-row {
      position: absolute;
      left: 9%;
      right: 9%;
      display: flex;
      justify-content: space-between;
    }

    .socket-row.top {
      top: 8%;
    }

    .socket-row.bottom {
      bottom: 8%;
    }

    .socket-row i {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: #232b3a;
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .led-bulb {
      width: 74px;
      height: 74px;
      border-radius: 50% 50% 44% 44%;
      background: #cbd5e1;
      border: 8px solid #f1f5f9;
      position: relative;
      transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .led-bulb::before,
    .led-bulb::after {
      content: "";
      position: absolute;
      width: 5px;

    /* =========================================

    @keyframes fadeIn {
      from { opacity: 0; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(25px); }

    /* =========================================
       BOXXY - ASISTENTE AUTÓNOMO

    .boxxy-container {

    .boxxy {

       ========================================= */
    #boxxy-svg-container {
      position: relative;
      width: 85px;
      height: 85px;
      display: flex;
      align-items: center;
      justify-content: center;

          {

            hint: "Revisa qué trae incorporado en la placa.",
            explanation: "Viene armada hasta los dientes con sensores internos, una matriz LED y botones, permitiendo hacer proyectos sin necesidad de conectar cosas externas.",
            options: [

          },
          {

            hint: "Es una SBC, una computadora completa.",
            explanation: "Al ser un microprocesador completo, la Raspberry Pi es idónea para visión artificial, servidores y algoritmos avanzados.",
            options: [
              { text: "Para prender un solo LED.", ok: false },
              { text: "Para armar un semáforo sencillo.", ok: false },

            ]
          },
          {
            question: "¿Cuál de estas tarjetas es conocida como el estándar industrial por su altísima precisión y bajo costo en masa?",

            explanation: "La STM32 domina el mercado comercial e industrial cuando se requiere extrema fiabilidad y manejo de muchos periféricos a bajo costo.",

              { text: "Arduino UNO", ok: false },
              { text: "Raspberry Pi", ok: false }

          }

    ];

    const STORAGE_KEY = "roboclaseArduinoV3";
    const state = {
      view: "home",
      moduleIndex: 0,
      step: 0,
      score: 0,
      answered: false,
      selectedAnswer: null,
      sensorTab: "ldr",
      boardFocus: "rieles",
      ledPolarity: "correcta",
      blinkRunning: false,
      blinkTimer: null,
      blinkDelay: 1000,
      puzzle: [],
      boardLabDone: false,
      progress: loadProgress()
    };
    
      const savedTheme = localStorage.getItem("macrobotTheme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
      const themeToggleBtn = document.getElementById("themeToggleBtn");
      if (themeToggleBtn) {
       themeToggleBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
}

    const stage = document.getElementById("stage");
    const sidebar = document.getElementById("sidebar");
    const footerNav = document.getElementById("footerNav");
    const dotLine = document.getElementById("dotLine");
    const nextBtn = document.getElementById("nextBtn");
    const quizNextBtn = document.getElementById("quizNextBtn");
    const progressPill = document.getElementById("progressPill");

    function loadProgress() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (error) {
        return {};
      }
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }

    function moduleProgress(moduleId) {
      if (!state.progress[moduleId]) {
        state.progress[moduleId] = { lessons: [], quizBest: 0, lab: false };
      }
      return state.progress[moduleId];
    }

    function modulePercent(moduleData) {
      const saved = moduleProgress(moduleData.id);
      const lessonCount = new Set(saved.lessons).size;
      const quizUnit = saved.quizBest > 0 ? 1 : 0;
      const labUnit = saved.lab ? 1 : 0;
      return Math.round(((lessonCount + quizUnit + labUnit) / (moduleData.lessons.length + 2)) * 100);
    }

    function markLesson(moduleData, index) {
      const saved = moduleProgress(moduleData.id);
      if (!saved.lessons.includes(index)) {
        saved.lessons.push(index);
        saveProgress();
      }
    }

    function markLab(moduleData) {
      const saved = moduleProgress(moduleData.id);
      saved.lab = true;
      saveProgress();
    }

    function setThemeVars(moduleData) {
      document.documentElement.style.setProperty("--accent", moduleData.accent);
      document.documentElement.style.setProperty("--accent-soft", moduleData.accentSoft);
    }

    function escapeHTML(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function getModule() {
      return MODULES[state.moduleIndex];
    }

    function updateShell() {
      const activeModule = getModule();
      setThemeVars(activeModule);
      renderSidebar();
      const total = MODULES.reduce((sum, mod) => sum + modulePercent(mod), 0);
      progressPill.textContent = `Avance total: ${Math.round(total / MODULES.length)}%`;
    }

    function renderSidebar() {
      const routeButtons = MODULES.map((mod, index) => {
        const pct = modulePercent(mod);
        const active = index === state.moduleIndex && state.view !== "home" ? " is-active" : "";
        return `
          <button class="route-btn${active}" data-action="selectModule" data-module="${index}">
            <span class="route-icon" style="background:${mod.accent}">${mod.icon}</span>
            <span>
              <span class="route-title">${mod.shortTitle}</span>
              <span class="route-note">${mod.tagline}</span>
            </span>
            <span class="progress-ring" style="--pct:${pct}%"><span>${pct}%</span></span>
          </button>
        `;
      }).join("");

      sidebar.innerHTML = `
        <section class="panel">
          <h2 class="panel-title">Ruta</h2>
          <div class="route-list">${routeButtons}</div>
        </section>
        <section class="panel">
          <h2 class="panel-title">Repaso rápido</h2>
          <div class="summary-list">
            <div class="summary-row">
              <strong>01</strong>
              <span><strong>setup()</strong> prepara una vez; <strong>loop()</strong> repite siempre.</span>
            </div>
            <div class="summary-row">
              <strong>02</strong>
              <span><strong>HIGH</strong> enciende un pin digital; <strong>LOW</strong> lo apaga.</span>
            </div>
            <div class="summary-row">
              <strong>03</strong>
              <span>La resistencia limita corriente, y el condicional <strong>if</strong> toma decisiones.</span>
            </div>
            <div class="summary-row">
              <strong>04</strong>
              <span>Un <strong>MCU</strong> controla tareas específicas; el <strong>ESP32</strong> conecta tus circuitos al Wi-Fi (IoT).</span>
            </div>
          </div>
        </section>
      `;
    }

    function renderHome() {
      clearBlinkTimer();
      state.view = "home";
      footerNav.classList.add("hidden");
      updateShell();

      const cards = MODULES.map((mod, index) => {
        const pct = modulePercent(mod);
        return `
          <article class="mission-card" style="--accent:${mod.accent};--accent-soft:${mod.accentSoft}">
            <div class="mission-head">
              <div class="mission-icon">${mod.icon}</div>
              <div>
                <h2>${mod.title}</h2>
                <p>${mod.tagline}</p>
              </div>
            </div>
            <ul class="goal-list">
              ${mod.goals.map(goal => `<li>${goal}</li>`).join("")}
            </ul>
            <div class="meter-track" aria-hidden="true" style="width: 100%;">
              <div class="meter-fill" style="--width:${pct}%;background:${mod.accent}"></div>
            </div>
            <div class="mission-actions">
              <button data-action="startLesson" data-module="${index}">Clase</button>
              <button data-action="startLab" data-module="${index}">Laboratorio</button>
              <button data-action="startQuiz" data-module="${index}">Quiz</button>
            </div>
          </article>
        `;
      }).join("");

      stage.innerHTML = `
        <div class="dashboard">
          <section class="welcome">
            <div>
              <h1>Tablero de misiones Arduino</h1>
              <p>Una ruta breve, visual y práctica para que ustedes entiendan programación, componentes y circuitos antes de construir.</p>
              <div class="route-strip" aria-label="Ruta del curso">
                <span>Programar</span>
                <span>Conectar</span>
                <span>Interaccionar</span>
                <span>Probar</span>
              </div>
            </div>
            <div class="board-hero" aria-hidden="true">
              ${Array.from({ length: 10 }, () => `<i class="pin-dot"></i>`).join("")}
              <div class="chip">Arduino UNO</div>
              <div class="hero-led"></div>
            </div>
          </section>
          <section class="mission-grid">${cards}</section>
        </div>
      `;
    }

    function startLesson(moduleIndex) {
      clearBlinkTimer();
      state.view = "lesson";
      state.moduleIndex = moduleIndex;
      state.step = 0;
      state.answered = false;
      renderLesson();
    }

    function startQuiz(moduleIndex) {
      clearBlinkTimer();
      state.view = "quiz";
      state.moduleIndex = moduleIndex;
      state.step = 0;
      state.score = 0;
      state.answered = false;
      state.selectedAnswer = null;
      renderQuiz();
    }

    function startLab(moduleIndex) {
      clearBlinkTimer();
      state.view = "lab";
      state.moduleIndex = moduleIndex;
      state.step = 0;
      state.puzzle = [];
      state.boardLabDone = false;
      state.blinkRunning = false;
      renderLab();
    }

    function renderFooter(total, current, mode) {
      footerNav.classList.remove("hidden");
      dotLine.innerHTML = Array.from({ length: total }, (_, index) => {
        const cls = index === current ? "dot is-current" : index < current ? "dot is-done" : "dot";
        return `<span class="${cls}"></span>`;
      }).join("");

      quizNextBtn.classList.toggle("hidden", mode !== "quiz");
      nextBtn.classList.toggle("hidden", mode === "quiz");
      quizNextBtn.disabled = mode === "quiz" && !state.answered;
      nextBtn.textContent = current === total - 1 ? "Terminar" : "Siguiente";
    }

    function renderLesson() {
      const mod = getModule();
      const lesson = mod.lessons[state.step];
      markLesson(mod, state.step);
      updateShell();
      renderFooter(mod.lessons.length, state.step, "lesson");

      stage.innerHTML = `
        <article class="stage-panel">
          ${renderStageTop(mod, lesson.title, lesson.subtitle, lesson.eyebrow, state.step + 1, mod.lessons.length)}
          <div class="stage-body">
            <div class="coach">
              <div class="coach-face">BIT</div>
              <p>${lesson.coach}</p>
            </div>
            <div class="content-grid">
              <div>
                <div class="key-box">
                  <h3>Idea clave</h3>
                  <p>${lesson.key}</p>
                </div>
                ${renderLessonMain(lesson)}
              </div>
              ${renderVisual(lesson.type)}
            </div>
          </div>
        </article>
      `;
    }

    function renderStageTop(mod, title, subtitle, eyebrow, current, total) {
      const width = Math.round((current / total) * 100);
      return `
        <header class="stage-top">
          <div>
            <span class="eyebrow">${eyebrow}</span>
            <h1>${title}</h1>
            <p class="stage-sub">${subtitle}</p>
          </div>
          <div class="step-meter">
            <span class="step-count">${current} / ${total}</span>
            <div class="meter-track"><div class="meter-fill" style="--width:${width}%"></div></div>
          </div>
        </header>
      `;
    }

    function renderLessonMain(lesson) {
      if (lesson.type === "anatomy") {
        return `
          <div class="comparison-grid" style="margin-top:14px">
            <div class="compare-box">
              <code>void setup() { }</code>
              <h3>Preparación</h3>
              <p>Configura pines, sensores y condiciones iniciales. Ocurre solo una vez.</p>
            </div>
            <div class="compare-box">
              <code>void loop() { }</code>
              <h3>Acción repetida</h3>
              <p>Contiene el comportamiento principal. Arduino lo ejecuta continuamente.</p>
            </div>
          </div>
        `;
      }

      if (lesson.type === "logic_rules") {
        return `
          <div class="comparison-grid" style="margin-top:14px">
            <div class="compare-box">
              <code>if (estado == HIGH) { }</code>
              <h3>Condición Verdadera</h3>
              <p>El código entre llaves se ejecuta si la respuesta es sí (ej. botón presionado).</p>
            </div>
            <div class="compare-box">
              <code>else { }</code>
              <h3>Condición Falsa</h3>
              <p>Si la respuesta es no, Arduino ignora el 'if' y ejecuta el código del 'else'.</p>
            </div>
          </div>
        `;
      }

      if (lesson.type === "mcu_vs_sbc") {
        return `
          <div class="comparison-grid" style="margin-top:14px">
            <div class="compare-box">
              <code>Microcontrolador (MCU)</code>
              <h3>El Trabajador Dedicado</h3>
              <p>Chip "todo en uno" diseñado para tareas específicas y repetitivas (leer sensor, mover motor). No usa Sistema Operativo.</p>
            </div>
            <div class="compare-box">
              <code>Microprocesador (SBC)</code>
              <h3>El Cerebro Multitarea</h3>
              <p>Computadora completa. Necesita memoria externa y Sistema Operativo (Linux/Windows) para funcionar y maneja multitarea compleja.</p>
            </div>
          </div>
        `;
      }

      if (lesson.type === "board_cards") {
        return `
          <div class="component-grid" style="margin-top:14px">
            <div class="component-card" style="border-left: 4px solid var(--accent);">
              <h3>${lesson.board1.title}</h3>
              <p>${lesson.board1.desc}</p>
            </div>
            <div class="component-card" style="border-left: 4px solid var(--muted);">
              <h3>${lesson.board2.title}</h3>
              <p>${lesson.board2.desc}</p>
            </div>
          </div>
        `;
      }

      if (lesson.type === "transition") {
        return `
          <div class="flow-card" style="margin-top:14px; padding: 24px; border: 2px solid var(--accent); background: var(--accent-soft);">
            <strong style="font-size: 1.4rem;">🚀 ¡Siguiente Nivel Desbloqueado!</strong>
            <p style="font-size: 1.05rem; font-weight: 700; color: var(--ink);">Nos despedimos del Arduino Uno local y comenzamos nuestra aventura de conexión con el ESP32 y el Internet de las Cosas.</p>
          </div>
        `;
      }

      if (lesson.type === "rules") {
        const rules = [
          [";", "Punto y coma", "Cierra instrucciones como pinMode(13, OUTPUT);", "Sin punto y coma, el compilador no sabe dónde termina la orden."],
          ["{ }", "Llaves", "Agrupan bloques de código dentro de setup() o loop().", "Si una llave falta, el programa queda desordenado."],
          ["Aa", "Mayúsculas", "pinMode y PinMode no son iguales para C++.", "Copiar respetando mayúsculas evita errores difíciles de ver."],
          ["//", "Comentarios", "Permiten escribir notas que Arduino no ejecuta.", "Sirven para recordar qué hace una parte del código."]
        ];
        return `<div class="rules-grid" style="margin-top:14px">${rules.map((rule, index) => `
          <button class="rule-card" data-action="flipRule" data-detail="${escapeHTML(rule[3])}">
            <span class="rule-symbol">${rule[0]}</span>
            <h3>${rule[1]}</h3>
            <p>${rule[2]}</p>
          </button>
        `).join("")}</div>`;
      }

      if (lesson.type === "commands") {
        const commands = [
          ["int led = 13;", "Crea una variable llamada led y guarda el número del pin."],
          ["pinMode(led, OUTPUT);", "Prepara el pin para enviar energía hacia afuera."],
          ["digitalWrite(led, HIGH);", "Enciende el pin elegido."],
          ["digitalWrite(led, LOW);", "Apaga el pin elegido."],
          ["delay(1000);", "Espera 1000 milisegundos, es decir, un segundo."]
        ];
        return `<div class="command-grid" style="margin-top:14px">${commands.map(row => `
          <div class="command-row"><code>${row[0]}</code><span>${row[1]}</span></div>
        `).join("")}</div>`;
      }

      if (lesson.type === "buzzer_commands") {
        const commands = [
          ["digitalRead(pin);", "Lee 1 o 0 de un pin digital (botón)."],
          ["analogRead(pin);", "Lee de 0 a 1023 de un pin analógico (potenciómetro)."],
          ["tone(pin, frecuencia);", "Inicia un sonido en el buzzer."],
          ["noTone(pin);", "Detiene el sonido del buzzer."]
        ];
        return `<div class="command-grid" style="margin-top:14px">${commands.map(row => `
          <div class="command-row"><code>${row[0]}</code><span>${row[1]}</span></div>
        `).join("")}</div>`;
      }

      if (lesson.type === "code") {
        return `
          <div class="mini-card" style="margin-top:14px">
            <div class="code-tools">
              <h3>Parpadeo básico</h3>
              <button class="text-btn" data-action="toggleCode">Traducir a humano</button>
            </div>
            <pre id="codeBlock" class="code-block">${renderCode("real")}</pre>
          </div>
        `;
      }

      if (lesson.type === "components") {
        return `
          <div class="component-grid" style="margin-top:14px">
            <div class="component-card">
              <h3>Pasivos</h3>
              <p>Limitan, consumen o dejan pasar energía. Ejemplo: resistencia.</p>
            </div>
            <div class="component-card">
              <h3>Activos</h3>
              <p>Procesan, controlan o producen una acción. Ejemplo: microcontrolador.</p>
            </div>
          </div>
        `;
      }

      if (lesson.type === "sensors") {
        return `
          <div class="mini-card" style="margin-top:14px">
            <div class="tabs">
              <button class="tab-btn ${state.sensorTab === "ldr" ? "is-active" : ""}" data-action="sensorTab" data-tab="ldr">LDR</button>
              <button class="tab-btn ${state.sensorTab === "ultra" ? "is-active" : ""}" data-action="sensorTab" data-tab="ultra">Ultrasónico</button>
              <button class="tab-btn ${state.sensorTab === "servo" ? "is-active" : ""}" data-action="sensorTab" data-tab="servo">Servo</button>
            </div>
            <div id="sensorInfo">${sensorInfo(state.sensorTab)}</div>
          </div>
        `;
      }

      return `
        <div class="mini-card" style="margin-top:14px">
          <h3>En una frase</h3>
          <p>${lesson.subtitle}</p>
        </div>
      `;
    }

    function renderVisual(type) {
      if (type === "intro") {
        return `
          <div class="visual-board">
            <div class="arduino-visual" aria-label="Representación de una placa Arduino">
              <div class="socket-row top">${Array.from({ length: 10 }, () => "<i></i>").join("")}</div>
              <div class="socket-row bottom">${Array.from({ length: 10 }, () => "<i></i>").join("")}</div>

          </div>

        return `
          <div class="visual-board">
            <div class="flow-grid" style="width:100%">
              <div class="flow-card"><strong>${isAnatomy ? '1' : 'MCU'}</strong><p>${isAnatomy ? 'Encender placa' : 'Microcontrolador<br>(Foco y Velocidad)'}</p></div>

        return `
          <div class="visual-board">
            <div style="width: min(340px, 100%); aspect-ratio: 1.35; border-radius: var(--radius); background: var(--soft); border: 2px dashed var(--line); display: grid; place-items: center; text-align: center; color: var(--text); padding: 20px; position: relative;">
              <span style="font-size: 3rem; margin-bottom: 10px;">🔌</span>
              <strong>Hardware Especializado</strong>
              <span style="font-size: 0.85rem; margin-top: 8px;">Cada placa resuelve un problema distinto en la ingeniería.</span>
            </div>
          </div>
        `;
      }

      if (type === "transition") {
        return `
          <div class="visual-board">
            <div style="width: min(340px, 100%); aspect-ratio: 1.35; border-radius: var(--radius); background: var(--dark); color: white; display: grid; place-items: center; position: relative;">
              <div style="text-align: center; font-size: 1.5rem; font-weight: 900; letter-spacing: 2px;">
                ESP32 <span style="color: var(--teal); margin-left:8px;">IoT</span>
              </div>
            </div>
          </div>
        `;
      }

      if (type === "rules") {
        return `
          <div class="visual-board">
            <div class="mini-card">
              <h3 id="ruleFocusTitle">Pista de depuración</h3>
              <p id="ruleFocusText">Toca una regla para ver el error común que ayuda a evitar.</p>
            </div>
          </div>
        `;
      }

      if (type === "commands" || type === "code") {
        return renderBlinkMini(type === "code");
      }

      if (type === "board") {
        return renderProtoboard();
      }

      if (type === "led") {
        return renderLedDemo();
      }

      if (type === "sensors" || type === "brain") {
        const isSens = type === "sensors";
        return `
          <div class="visual-board">
            <div class="flow-grid" style="width:100%">
              <div class="flow-card"><strong>${isSens ? 'Sensor' : 'Entrada'}</strong><p>${isSens ? 'Detecta luz, distancia o interacción.' : 'Sensor lee el mundo.'}</p></div>
              <div class="flow-card"><strong>${isSens ? 'Código' : 'Proceso'}</strong><p>${isSens ? 'Compara datos y decide.' : 'Arduino ejecuta el programa.'}</p></div>
              <div class="flow-card"><strong>${isSens ? 'Motor' : 'Salida'}</strong><p>${isSens ? 'Convierte la orden en movimiento.' : 'LED, motor o pantalla responde.'}</p></div>
            </div>
          </div>
        `;
      }

      if (type === "button_info" || type === "logic_rules") {
        return `
          <div class="visual-board">
            <div class="flow-grid" style="width:100%">
              <div class="flow-card"><strong>Suelto</strong><p>LOW (0)</p></div>
              <div class="flow-card"><strong>👇</strong><p>digitalRead()</p></div>
              <div class="flow-card"><strong>Presionado</strong><p>HIGH (1)</p></div>
            </div>
          </div>
        `;

      if (type === "pot_info") {
        return `
          <div class="visual-board">
            <div class="flow-grid" style="width:100%">
              <div class="flow-card"><strong>Mínimo</strong><p>0</p></div>
              <div class="flow-card"><strong>Giro 🔄</strong><p>analogRead()</p></div>
              <div class="flow-card"><strong>Máximo</strong><p>1023</p></div>
            </div>
          </div>
        `;
      }

      if (type === "buzzer_commands") {

    function sensorInfo(tab) {
      const info = {
        ldr: ["LDR", "Cambia su resistencia según la cantidad de luz. Sirve para lámparas automáticas o robots que buscan claridad."],
        ultra: ["Sensor ultrasónico", "Emite sonido, espera el eco y calcula distancia. Es útil para detectar obstáculos."],
        servo: ["Servomotor", "Gira a un ángulo indicado. Es ideal para brazos, compuertas o mecanismos de precisión."]
      };
      return `<h3>${info[tab][0]}</h3><p>${info[tab][1]}</p>`;
    }

    function renderLab() {
      const mod = getModule();
      if (mod.lab.type === "sequence" && state.puzzle.join("|") === "Arduino 5V|Resistencia|LED|GND") {
        markLab(mod);
      }
      updateShell();
      footerNav.classList.add("hidden");
      
      let content = "";
      if (mod.lab.type === "blink") content = renderBlinkLab(mod);
      else if (mod.lab.type === "interactive_button") content = renderInteractiveButtonLab(mod);
      else if (mod.lab.type === "scenario") content = renderScenarioLab(mod);
      else content = renderSequenceLab(mod);

      stage.innerHTML = `
        <article class="stage-panel">
          ${renderStageTop(mod, mod.lab.title, mod.lab.subtitle, "Laboratorio", 1, 1)}
          <div class="stage-body">
            <div class="coach">
              <div class="coach-face">LAB</div>
              <p>Prueba, observa y corrige. En electrónica, entender el comportamiento vale tanto como recordar el nombre de la pieza.</p>
            </div>
            ${content}
          </div>
        </article>
      `;
    }

    function renderScenarioLab(mod) {
      const done = state.boardLabDone;
      if (done) markLab(mod);
      return `
        <div class="blink-lab" style="gap:20px;">
          <div class="mini-card" style="text-align:left; border-left: 4px solid var(--accent);">
            <h3>Misión de Selección</h3>
            <p>Tu equipo quiere construir una estación meteorológica que envíe la temperatura a una página web a través de Wi-Fi. ¿Qué controlador eliges?</p>
          </div>
          <div class="comparison-grid" style="width:100%;">
            <button class="rule-card" data-action="pickBoard" data-correct="false">
              <span class="rule-symbol">🔵</span><h3>Arduino UNO</h3><p>Clásico, pero sin Wi-Fi de fábrica.</p>
            </button>
            <button class="rule-card" data-action="pickBoard" data-correct="true" style="${done ? 'border-color:var(--green); background:var(--green-soft);' : ''}">
              <span class="rule-symbol">🌐</span><h3>ESP32</h3><p>Wi-Fi integrado y ultra potente.</p>
            </button>
            <button class="rule-card" data-action="pickBoard" data-correct="false">
              <span class="rule-symbol">📐</span><h3>Micro:bit</h3><p>Excelente para educación visual y Bluetooth, pero no ideal para servidores.</p>
            </button>
            <button class="rule-card" data-action="pickBoard" data-correct="false">
              <span class="rule-symbol">🍓</span><h3>Raspberry Pi</h3><p>Es una computadora, demasiado costosa para solo enviar un número.</p>
            </button>
          </div>
          <div class="lab-status">${done ? "¡Excelente elección! El ESP32 es el rey del IoT para estos casos." : "Selecciona la tarjeta correcta para avanzar."}</div>
          <div class="lab-controls">
            <button class="primary-btn" data-action="home">Volver al tablero</button>
          </div>
        </div>
      `;
    }

    function renderBlinkLab(mod) {
      return `
        <div class="blink-lab">
          <div id="labLed" class="led-bulb ${state.blinkRunning ? "is-on" : ""}"></div>
          <div class="lab-controls">
            <button class="primary-btn" data-action="toggleBlinkLab">${state.blinkRunning ? "Detener" : "Ejecutar"}</button>
            <button class="ghost-btn" data-action="completeLab">Marcar práctica</button>
            <div class="control-field">
              <label for="delayRange">Delay: <span id="delayLabel">${state.blinkDelay}</span> ms</label>
              <input id="delayRange" data-action="delayRange" type="range" min="250" max="1800" step="250" value="${state.blinkDelay}">
            </div>
          </div>
          <div class="mini-card">
            <h3>Lectura del comportamiento</h3>
            <p>Menos delay produce un parpadeo más rápido. Más delay hace que el LED permanezca más tiempo en cada estado.</p>
          </div>
        </div>
      `;
    }

    function renderSequenceLab(mod) {
      const order = ["Arduino 5V", "Resistencia", "LED", "GND"];
      const choices = ["LED", "GND", "Arduino 5V", "Resistencia"];
      const done = state.puzzle.length === order.length && state.puzzle.every((item, index) => item === order[index]);
      if (done) markLab(mod);

      return `
        <div class="sequence-lab">
          <div class="sequence-track">
            ${order.map((_, index) => `<div class="sequence-slot">${state.puzzle[index] || `Paso ${index + 1}`}</div>`).join("")}
          </div>
          <div class="choice-grid">
            ${choices.map(choice => `<button class="sequence-choice" data-action="pickSequence" data-choice="${choice}" ${state.puzzle.includes(choice) ? "disabled" : ""}>${choice}</button>`).join("")}
          </div>
          <div class="lab-status">${sequenceStatus(order)}</div>
          <div class="lab-controls">
            <button class="ghost-btn" data-action="resetSequence">Reiniciar práctica</button>
            <button class="primary-btn" data-action="home">Volver al tablero</button>
          </div>
        </div>
      `;
    }

    function renderInteractiveButtonLab(mod) {
      return `
        <div class="blink-lab" style="gap:24px; padding-bottom: 30px;">
          <div id="labLedBtn" class="led-bulb" style="margin: 0 auto;"></div>
          <div class="lab-controls" style="margin-top: 30px;">
             <button id="simButton" class="primary-btn" style="width:110px; height:110px; border-radius:50%; font-size:1.2rem; font-weight:900; background:var(--coral); box-shadow: 0 8px 0 #c2402b, 0 15px 20px rgba(0,0,0,0.2); transition: all 0.1s ease; touch-action: manipulation; user-select: none;">Pulsar</button>
          </div>
          <div class="mini-card" style="margin-top: 20px;">
            <h3>Lógica if / else en acción</h3>
            <p>Mantén presionado el botón. Tu dedo hace de la condición <strong>if</strong> (presionado = HIGH) para encender la luz. Al soltar, se activa el <strong>else</strong> (suelto = LOW) y el LED se apaga.</p>
          </div>
          <div class="lab-controls">
            <button class="ghost-btn" data-action="home">Volver al tablero</button>
          </div>
        </div>
      `;
    }

    function sequenceStatus(order) {
      if (state.puzzle.length === 0) return "Ruta esperada: fuente de energía, protección, luz y regreso a tierra.";
      const correctSoFar = state.puzzle.every((item, index) => item === order[index]);
      if (!correctSoFar) return "Hay una pieza fuera de orden. Revisa dónde debe ir la protección.";
      if (state.puzzle.length === order.length) return "Circuito completo: el LED queda protegido y tiene camino de regreso.";
      return "Vas bien. Continúa con el siguiente elemento del circuito.";
    }

    function renderQuiz() {
      clearBlinkTimer();
      const mod = getModule();
      const question = mod.quiz[state.step];
      updateShell();
      renderFooter(mod.quiz.length, state.step, "quiz");

      const letters = ["A", "B", "C"];
      stage.innerHTML = `
        <article class="stage-panel">
          ${renderStageTop(mod, "Pregunta de misión", question.hint, "Quiz", state.step + 1, mod.quiz.length)}
          <div class="stage-body quiz-card">
            <h2 class="quiz-question">${question.question}</h2>
            <div class="quiz-options">
              ${question.options.map((option, index) => renderOption(option, index, letters[index])).join("")}
            </div>
            <div id="feedback" class="feedback ${state.answered ? "is-visible" : ""} ${feedbackClass()}">
              ${state.answered ? feedbackText(question) : ""}
            </div>
          </div>
        </article>
      `;
    }

    function renderOption(option, index, letter) {
      let cls = "quiz-option";
      if (state.answered) {
        if (option.ok) cls += " is-correct";
        else if (state.selectedAnswer === index) cls += " is-wrong";
        else cls += " is-dimmed";
      }
      return `
        <button class="${cls}" data-action="answer" data-index="${index}" ${state.answered ? "disabled" : ""}>
          <span class="option-letter">${letter}</span>
          <span>${option.text}</span>
        </button>
      `;
    }

    function feedbackClass() {
      if (!state.answered) return "";
      const option = getModule().quiz[state.step].options[state.selectedAnswer];
      return option.ok ? "ok" : "no";
    }

    function feedbackText(question) {
      const option = question.options[state.selectedAnswer];
      const lead = option.ok ? "Correcto. " : "Revisa la respuesta marcada en verde. ";
      return lead + question.explanation;
    }

    function answerQuestion(index) {
      if (state.answered) return;
      const mod = getModule();
      const option = mod.quiz[state.step].options[index];
      state.answered = true;
      state.selectedAnswer = index;
      if (option.ok) state.score += 1;
      renderQuiz();
    }

    function nextQuiz() {
      if (!state.answered) return;
      const mod = getModule();
      if (state.step >= mod.quiz.length - 1) {
        renderResult();
        return;
      }
      state.step += 1;
      state.answered = false;
      state.selectedAnswer = null;
      renderQuiz();
    }

    function renderResult() {
      const mod = getModule();
      const total = mod.quiz.length;
      const pct = Math.round((state.score / total) * 100);
      const saved = moduleProgress(mod.id);
      saved.quizBest = Math.max(saved.quizBest || 0, pct);
      saveProgress();
      updateShell();
      footerNav.classList.add("hidden");
      if (pct >= 60) spawnConfetti();

      const title = pct === 100 ? "Resultado perfecto" : pct >= 60 ? "Buen avance" : "A repasar y volver";
      const note = pct === 100
        ? "Dominas esta misión. Ustedes podrán usar esta sección como repaso antes de construir."
        : pct >= 60
          ? "Ya hay base. Conviene revisar las preguntas falladas antes del siguiente montaje."
          : "La clase está lista para repetir en fragmentos más cortos y volver al quiz.";

      stage.innerHTML = `
        <article class="stage-panel result">
          <div class="score-badge" style="--score:${pct}%"><span>${state.score}/${total}</span></div>
          <h1>${title}</h1>
          <p>${note}</p>
          <div class="quiz-actions">
            <button class="primary-btn" data-action="startQuiz" data-module="${state.moduleIndex}">Intentar de nuevo</button>
            <button class="ghost-btn" data-action="startLesson" data-module="${state.moduleIndex}">Repasar clase</button>
            <button class="ghost-btn" data-action="home">Tablero</button>
          </div>
        </article>
      `;
    }

    function prevStep() {
      if (state.view === "lesson" && state.step > 0) {
        clearBlinkTimer();
        state.step -= 1;
        renderLesson();
      } else if (state.view === "quiz" && state.step > 0) {
        state.step -= 1;
        state.answered = false;
        state.selectedAnswer = null;
        renderQuiz();
      }
    }

    function nextStep() {
      if (state.view !== "lesson") return;
      const mod = getModule();
      if (state.step >= mod.lessons.length - 1) {
        renderHome();
        return;
      }
      clearBlinkTimer();
      state.step += 1;
      renderLesson();
    }

    function toggleCode() {
      const block = document.getElementById("codeBlock");
      if (!block) return;
      const isHuman = block.dataset.mode === "human";
      block.dataset.mode = isHuman ? "real" : "human";
      block.innerHTML = renderCode(isHuman ? "real" : "human");
    }

    function toggleBlink(targetId) {
      if (state.blinkRunning) {
        clearBlinkTimer();
        if (state.view === "lab") renderLab();
        else renderLesson();
        return;
      }

      state.blinkRunning = true;
      if (state.view === "lab") renderLab();
      else renderLesson();
      startBlinking(targetId);
    }

    function startBlinking(targetId) {
      if (state.blinkTimer) {
        clearInterval(state.blinkTimer);
        state.blinkTimer = null;
      }
      state.blinkRunning = true;
      state.blinkTimer = setInterval(() => {
        const led = document.getElementById(targetId);
        if (led) led.classList.toggle("is-on");
      }, state.blinkDelay);
    }

    function clearBlinkTimer() {
      if (state.blinkTimer) {
        clearInterval(state.blinkTimer);
        state.blinkTimer = null;
      }
      state.blinkRunning = false;
    }

    function spawnConfetti() {
      const layer = document.getElementById("confettiLayer");
      const colors = ["#008f96", "#7257d8", "#f05d45", "#238b52", "#f0aa24", "#3567d6"];
      layer.innerHTML = "";
      for (let i = 0; i < 42; i += 1) {
        const piece = document.createElement("span");
        piece.className = "confetti";
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.top = `${18 + Math.random() * 32}%`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * 260}ms`;
        layer.appendChild(piece);
      }
      setTimeout(() => { layer.innerHTML = ""; }, 1600);
    }

    function handleBtnPress(event) {
      const btn = event.target.closest("#simButton");
      if (!btn) return;
      event.preventDefault(); 
      btn.style.transform = "translateY(8px)";
      btn.style.boxShadow = "0 0 0 #c2402b, 0 5px 10px rgba(0,0,0,0.2)";
      
      const led = document.getElementById("labLedBtn");
      if (led) led.classList.add("is-on");

      const mod = getModule();
      if (mod && mod.lab.type === "interactive_button") {
        markLab(mod);
        updateShell();
      }
    }

    function handleBtnRelease(event) {
      const btn = document.getElementById("simButton");
      if (btn) {
        btn.style.transform = "translateY(0)";
        btn.style.boxShadow = "0 8px 0 #c2402b, 0 15px 20px rgba(0,0,0,0.2)";
      }
      const led = document.getElementById("labLedBtn");
      if (led) led.classList.remove("is-on");
    }

    function handleClick(event) {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;

      if (action === "enterApp") {
      document.getElementById("splashScreen").classList.add("is-hidden");
      // Agrega esta línea para despertar a Boxxy
      document.querySelector(".boxxy-container").style.display = "block";
    }

      if (action === "home") renderHome();
      if (action === "enterApp") {
        document.getElementById("splashScreen").classList.add("is-hidden");
      }
      if (action === "selectModule") {
        state.moduleIndex = Number(target.dataset.module);
        renderHome();
      }
      if (action === "startLesson") startLesson(Number(target.dataset.module));
      if (action === "startQuiz") startQuiz(Number(target.dataset.module));
      if (action === "startLab") startLab(Number(target.dataset.module));
      if (action === "prev") prevStep();
      if (action === "next") nextStep();
      if (action === "nextQuiz") nextQuiz();
      if (action === "answer") answerQuestion(Number(target.dataset.index));
      if (action === "toggleCode") toggleCode();
      if (action === "toggleBlink") toggleBlink("miniLed");
      if (action === "toggleBlinkLab") toggleBlink("labLed");
      if (action === "completeLab") {
        markLab(getModule());
        renderHome();
      }
      if (action === "flipRule") {
        const text = document.getElementById("ruleFocusText");
        if (text) text.textContent = target.dataset.detail;
      }
      if (action === "boardFocus") {
        state.boardFocus = target.dataset.focus;
        renderLesson();
      }
      if (action === "polarity") {
        state.ledPolarity = target.dataset.value;
        renderLesson();
      }
      if (action === "sensorTab") {
        state.sensorTab = target.dataset.tab;
        renderLesson();
      }
      if (action === "pickSequence") {
        if (!state.puzzle.includes(target.dataset.choice)) {
          state.puzzle.push(target.dataset.choice);
          renderLab();
        }
      }
      if (action === "resetSequence") {
        state.puzzle = [];
        renderLab();
      }
      if (action === "pickBoard") {
        if (target.dataset.correct === "true") {
          state.boardLabDone = true;
          renderLab();
        } else {
          target.style.borderColor = "var(--coral)";
          target.style.background = "var(--coral-soft)";
        }
      }
      if (action === "resetProgress") {
        localStorage.removeItem(STORAGE_KEY);
        state.progress = {};
        state.puzzle = [];
        state.boardLabDone = false;
        clearBlinkTimer();
        renderHome();
      }
      if (action === "toggleTheme") {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("macrobotTheme", newTheme);
        
        target.textContent = newTheme === "dark" ? "☀️" : "🌙";
      }
    }

    function handleInput(event) {
      const target = event.target;
      if (target.dataset.action === "delayRange") {
        state.blinkDelay = Number(target.value);
        const label = document.getElementById("delayLabel");
        if (label) label.textContent = state.blinkDelay;
        if (state.blinkRunning) startBlinking("labLed");
      }
    }

    function getRandomMessage(type) {
      const messages = boxxyState.messages[type] || [];
      return messages[Math.floor(Math.random() * messages.length)] || "Hola";
    }

    function showBoxxySpeech(message, duration = 3000) {
      const speechBubble = document.getElementById("boxxySpeech");
      if (!speechBubble) return;
      
      speechBubble.textContent = message;
      speechBubble.classList.add("is-visible");
      
      clearTimeout(boxxyState.messageTimeout);
      boxxyState.messageTimeout = setTimeout(() => {
        speechBubble.classList.remove("is-visible");
      }, duration);
    }

    function moveBoxxy() {
      const boxxy = document.getElementById("boxxy");
      if (!boxxy) return;
      
      let viewType = state.view;
      const maxX = window.innerWidth - 100;
      const maxY = window.innerHeight - 100;
      
      if (viewType === "home") {
        boxxyState.targetPosition = { x: maxX * 0.7, y: maxY * 0.3 };
      } else if (viewType === "lesson") {
        boxxyState.targetPosition = { x: maxX * 0.5, y: maxY * 0.7 };
      } else if (viewType === "lab") {
        boxxyState.targetPosition = { x: maxX * 0.8, y: maxY * 0.4 };
      } else if (viewType === "quiz") {
        boxxyState.targetPosition = { x: maxX * 0.2, y: maxY * 0.6 };
      }
      
      boxxyState.targetPosition.x = Math.max(30, Math.min(boxxyState.targetPosition.x, maxX));
      boxxyState.targetPosition.y = Math.max(30, Math.min(boxxyState.targetPosition.y, maxY));
      
      const dx = boxxyState.targetPosition.x - boxxyState.position.x;
      const dy = boxxyState.targetPosition.y - boxxyState.position.y;
      
      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
        boxxyState.position.x += dx * 0.1;
        boxxyState.position.y += dy * 0.1;
      } else {
        boxxyState.position.x = boxxyState.targetPosition.x;
        boxxyState.position.y = boxxyState.targetPosition.y;
      }
      
      const container = document.querySelector(".boxxy-container");
      if (container) {
        container.style.right = (window.innerWidth - boxxyState.position.x - 40) + "px";
        container.style.bottom = (window.innerHeight - boxxyState.position.y - 40) + "px";
      }
    }

    function updateBoxxyContext() {
      const view = state.view;
      
      if (view === "home") {
        showBoxxySpeech(getRandomMessage("home"), 2000);
      } else if (view === "lesson") {
        showBoxxySpeech(getRandomMessage("lesson"), 2500);
      } else if (view === "lab") {
        showBoxxySpeech(getRandomMessage("lab"), 2500);
      }
    }

    function reactToQuizAnswer(isCorrect) {
      const messageType = isCorrect ? "quiz_correct" : "quiz_wrong";
      const message = getRandomMessage(messageType);
      
      const boxxy = document.getElementById("boxxy");
      if (boxxy) {
        if (isCorrect) {
          updateBoxxyEyes("happy");
          boxxy.classList.add("boxxy-happy");
          setTimeout(() => { 
            boxxy.classList.remove("boxxy-happy");
            updateBoxxyEyes("neutral");
          }, 1500);
          
          if (state.view === "quiz") spawnConfetti();
        } else {
          updateBoxxyEyes("sad");
          boxxy.classList.add("boxxy-sad");
          setTimeout(() => { 
            boxxy.classList.remove("boxxy-sad");
            updateBoxxyEyes("neutral");
          }, 1500);
        }
      }
      
      showBoxxySpeech(message, 2500);
    }

    async function askBoxxyAI(question) {
      try {
        const response = await fetch("http://localhost:11434/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "gemma2", 
            prompt: `Eres Boxxy, un robot asistente, divertido y empático, para niños de sexto grado que están aprendiendo electrónica y robótica. Responde de forma muy clara, amigable y en un máximo de 2 oraciones a esta duda: ${question}`,
            stream: false
          })
        });
        
        if (!response.ok) {
          throw new Error(`Error HTTP: ${response.status}`);
        }
        
        const data = await response.json();
        saveConversation(question, data.response);
        return data.response;
        
      } catch (error) {
        console.error("Boxxy AI Error:", error);
        
        const context = {
          view: state.view,
          module: MODULES[state.moduleIndex]?.title || "inicio",
          step: state.step
        };
        const fallbackResponse = generateContextualResponse(question, context);
        saveConversation(question, fallbackResponse);
        return fallbackResponse;
      }
    }

    function generateContextualResponse(question, context) {
      const q = question.toLowerCase()
                        .normalize("NFD")
                        .replace(/[\u0300-\u036f]/g, "")
                        .replace(/[¿?¡!.,]/g, "");
      
      const keywords = {
        "hola": "¡Hola! Soy Boxxy. ¿En qué parte del circuito o del código te puedo ayudar hoy?",
        "quien eres": "Soy Boxxy, el asistente inteligente de MacroBot Lab. ¡Estoy aquí para ayudarte a construir cosas geniales!",
        "protoboard": "La protoboard es una tabla llena de agujeritos conectada por dentro. Sirve para armar y probar circuitos sin tener que soldar los cables.",
        "arduino": "Arduino es como el cerebro de nuestro robot. Le conectamos sensores para que sienta, y le damos código para que pensé y actúe.",
        "robot": "¡Un robot es una máquina que armaremos juntos! Necesitará un cerebro (Arduino), energía, y código para saber qué hacer.",
        "setup": "En Arduino, setup() prepara la placa una sola vez al iniciar. Aquí le decimos quién es entrada y quién es salida usando pinMode().",
        "loop": "loop() es el corazón de tu código. Todo lo que escribas dentro de esas llaves se repetirá infinitamente.",
        "led": "Un LED es un diodo que emite luz. Tiene lado positivo (pata larga) y negativo (pata corta). ¡No olvides protegerlo con una resistencia!",
        "resistencia": "La resistencia es nuestro escudo. Limita la fuerza de la corriente eléctrica para que componentes como el LED no se quemen.",
        "error": "¡No te frustres! Si hay un error, como un semáforo rojo, revisa si te falta un punto y coma (;) al final o si olvidaste cerrar una llave {}.",
        "pin": "Los pines numéricos (0-13) envían o reciben señales. Es como conectar un cable a un interruptor específico de Arduino.",
        "gnd": "GND significa Ground o Tierra. Es el polo negativo al que toda la electricidad debe llegar para cerrar el círculo del circuito.",
        "boton": "Para leer un botón usamos digitalRead(). Recuerda que HIGH significa que lo estás presionando, y LOW que está suelto.",
        "pulsador": "Para leer un botón usamos digitalRead(). Recuerda que HIGH significa presionado y LOW suelto.",
        "gracias": "¡De nada! Recuerda que equivocarse es parte de ser un gran inventor. ¿Seguimos?"
      };
      
      for (const [key, answer] of Object.entries(keywords)) {
        if (q.includes(key)) {
          return answer;
        }
      }
      
      if (context.view === "lesson") {
        return `Buena pregunta sobre el módulo de ${context.module}. Fíjate en la sección "Idea clave" en pantalla. ¿Tienes dudas con algún comando específico?`;
      } else if (context.view === "lab") {
        return "En el laboratorio lo importante es probar. Si el circuito no funciona, verifica siempre que el cable GND esté conectado.";
      } else if (context.view === "quiz") {
        return "Estás en pleno Quiz, trata de recordar las reglas de oro. ¡Tú puedes!";
      }
      
      return "Hmm, mis circuitos están pensando en eso... Prueba preguntarme sobre qué es Arduino, la protoboard, o cómo prender un LED.";
    }

    // ========================================
    // BOXXY 2.0: SVG Eye & Animation System
    // ========================================
    let boxxyState2 = {
      mouseX: window.innerWidth / 2,
      mouseY: window.innerHeight / 2,
      blinkTimer: null,
      inactivityTimer: null,
      lastInteraction: Date.now(),
      eyeState: "neutral",
      conversationHistory: [],
      hintAttempts: {},
      maxHints: 3
    };

    function updateBoxxyEyes(state) {
      const leftPupil = document.querySelector(".left-eye-pupil");
      const rightPupil = document.querySelector(".right-eye-pupil");
      const mouth = document.getElementById("boxxy-mouth");
      
      if (!leftPupil || !rightPupil || !mouth) return;

      if (state === "happy") {
        mouth.setAttribute("d", "M 42 62 Q 50 72 58 62");
        leftPupil.setAttribute("fill", "#00ff00");
        rightPupil.setAttribute("fill", "#00ff00");
      } else if (state === "sad") {
        mouth.setAttribute("d", "M 42 66 Q 50 60 58 66");
        leftPupil.setAttribute("fill", "#ff6b6b");
        rightPupil.setAttribute("fill", "#ff6b6b");
      } else if (state === "worried") {
        mouth.setAttribute("d", "M 42 66 Q 50 60 58 66"); // Curva invertida para boca triste/preocupada
        leftPupil.setAttribute("fill", "#ffa500");
        rightPupil.setAttribute("fill", "#ffa500");
      } else {
          mouth.setAttribute("d", "M 42 62 Q 50 68 58 62");
          leftPupil.setAttribute("fill", "#142033");
          rightPupil.setAttribute("fill", "#142033");
      }
      boxxyState2.eyeState = state;
    }
function trackMouseMovement() {
      document.addEventListener("mousemove", (e) => {
        boxxyState2.mouseX = e.clientX;
        boxxyState2.mouseY = e.clientY;
        boxxyState2.lastInteraction = Date.now();
        
        // --- NUEVO: Volver a la normalidad al detectar movimiento ---
        if (boxxyState2.eyeState === "worried") {
          updateBoxxyEyes("neutral");
          
          // Opcional: Oculta el mensaje de preocupación inmediatamente para limpiar la pantalla
          const speechBubble = document.getElementById("boxxySpeech");
          if (speechBubble) {
            speechBubble.classList.remove("is-visible");
          }
        }
        // -----------------------------------------------------------
        
        const boxxyElement = document.getElementById("boxxy");
        if (!boxxyElement) return;
        
        const rect = boxxyElement.getBoundingClientRect();
        const boxxyX = rect.left + rect.width / 2;
        const boxxyY = rect.top + rect.height / 2;
        
        const angle = Math.atan2(e.clientY - boxxyY, e.clientX - boxxyX);
        const distance = 2;
        
        const leftEye = document.querySelector(".left-eye-pupil");
        const rightEye = document.querySelector(".right-eye-pupil");
        
        if (leftEye && rightEye) {
          const offsetX = Math.cos(angle) * distance;
          const offsetY = Math.sin(angle) * distance;
          
          leftEye.setAttribute("cx", 35 + offsetX);
          leftEye.setAttribute("cy", 42 + offsetY);
          rightEye.setAttribute("cx", 65 + offsetX);
          rightEye.setAttribute("cy", 42 + offsetY);
        }
      });
    }

    function automaticBlink() {
      const performBlink = () => {
        const eyes = document.querySelectorAll(".boxxy-eye");
        eyes.forEach(eye => {
          eye.classList.add("boxxy-blinking");
          setTimeout(() => {
            eye.classList.remove("boxxy-blinking");
          }, 400);
        });
        
        boxxyState2.blinkTimer = setTimeout(performBlink, 3000 + Math.random() * 4000);
      };
      
      boxxyState2.blinkTimer = setTimeout(performBlink, 3000);
    }

function inactivityDetection() {
      const checkInactivity = () => {
        const now = Date.now();
        const timeSinceInteraction = now - boxxyState2.lastInteraction;
        
        
        if (timeSinceInteraction > 30000) { 
          if (boxxyState2.eyeState !== "worried") {
            updateBoxxyEyes("worried");
            
            // Mensajes aleatorios de preocupación
            const mensajes = [
              "¿Estás bien?",
              "¿Necesitas ayuda con algo?",
              "Me preocupas, ¿todo en orden?",
              "¿Te perdiste en el código?"
            ];
            const mensajeElegido = mensajes[Math.floor(Math.random() * mensajes.length)];
            
            showBoxxySpeech(mensajeElegido, 4000);
          }
        }
      };
      
      // Revisa cada 10 segundos
      boxxyState2.inactivityTimer = setInterval(checkInactivity, 10000);
    }

    function saveConversation(question, answer) {
      boxxyState2.conversationHistory.push({
        question,
        answer,
        timestamp: Date.now(),
        module: state.view,
        lesson: state.step
      });
      
      const history = JSON.parse(localStorage.getItem('boxxyHistory') || '[]');
      history.push({ question, answer, timestamp: Date.now() });
      if (history.length > 10) history.shift();
      localStorage.setItem('boxxyHistory', JSON.stringify(history));
    }

    const boxxyElement = document.getElementById("boxxy");
    const boxxyChatDialog = document.getElementById("boxxyChatDialog");
    const boxxyCloseBtn = document.getElementById("boxxyCloseBtn");
    const boxxySendBtn = document.getElementById("boxxySendBtn");
    const boxxyQuestion = document.getElementById("boxxyQuestion");
    const boxxyResponse = document.getElementById("boxxyResponse");
    const boxxyResponseText = document.getElementById("boxxyResponseText");

    if (boxxyElement) {
      boxxyElement.addEventListener("click", () => {
        boxxyChatDialog.classList.add("is-open");
        boxxyQuestion.focus();
      });
    }

    if (boxxyCloseBtn) {
      boxxyCloseBtn.addEventListener("click", () => {
        boxxyChatDialog.classList.remove("is-open");
        boxxyResponse.style.display = "none";
      });
    }

    boxxyChatDialog.addEventListener("click", (e) => {
      if (e.target === boxxyChatDialog) {
        boxxyChatDialog.classList.remove("is-open");
        boxxyResponse.style.display = "none";
      }
    });

    if (boxxySendBtn) {
      boxxySendBtn.addEventListener("click", async () => {
        const question = boxxyQuestion.value.trim();
        if (!question) {
          boxxyResponseText.textContent = "Por favor, escribe una pregunta.";
          boxxyResponse.style.display = "block";
          return;
        }
        
        boxxySendBtn.disabled = true;
        boxxySendBtn.textContent = "Pensando...";
        
        const answer = await askBoxxyAI(question);
        
        boxxyResponseText.textContent = answer;
        boxxyResponse.style.display = "block";
        boxxyQuestion.value = "";
        
        boxxySendBtn.disabled = false;
        boxxySendBtn.textContent = "Enviar Pregunta";
      });
    }

    if (boxxyQuestion) {
      boxxyQuestion.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          boxxySendBtn.click();
        }
      });
    }

    trackMouseMovement();
    automaticBlink();
    inactivityDetection();

    setInterval(() => {
      moveBoxxy();
    }, 50);

    const originalRenderHome = renderHome;
    const originalRenderLesson = renderLesson;
    const originalRenderLab = startLab;
    const originalRenderQuiz = startQuiz;

    renderHome = function() {
      originalRenderHome.call(this);
      setTimeout(() => updateBoxxyContext(), 300);
    };

    renderLesson = function() {
      originalRenderLesson.call(this);
      setTimeout(() => updateBoxxyContext(), 300);
    };

    const originalAnswerQuestion = answerQuestion;
    answerQuestion = function(index) {
      const mod = getModule();
      const quiz = mod.quiz;
      const option = quiz[state.step]?.options[index];
      
      reactToQuizAnswer(option?.ok || false);
      originalAnswerQuestion.call(this, index);
    };

    document.addEventListener("click", handleClick);
    document.addEventListener("input", handleInput);
      
    document.addEventListener("pointerdown", handleBtnPress);
    document.addEventListener("pointerup", handleBtnRelease);
    document.addEventListener("pointerleave", handleBtnRelease);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        if (state.view === "lesson") nextStep();
        else if (state.view === "quiz" && state.answered) nextQuiz();
      }
      if (event.key === "ArrowLeft") prevStep();
      if (state.view === "quiz" && !state.answered && ["1", "2", "3"].includes(event.key)) {
        answerQuestion(Number(event.key) - 1);
      }
    });

    renderHome();
  </script>
</body>
</html>
