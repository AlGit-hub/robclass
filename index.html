<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboClase · Aventura Arduino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           VARIABLES & RESET
        ============================================================ */
        :root {
            --teal:       #00979C;
            --teal-light: #e0f5f5;
            --teal-dark:  #006f73;
            --blue:       #3b82f6;
            --blue-light: #dbeafe;
            --purple:     #8b5cf6;
            --purple-light:#ede9fe;
            --orange:     #f97316;
            --orange-light:#ffedd5;
            --green:      #22c55e;
            --green-light:#dcfce7;
            --red:        #ef4444;
            --red-light:  #fee2e2;
            --yellow:     #fbbf24;
            --yellow-light:#fef3c7;
            --slate-900:  #0f172a;
            --slate-700:  #334155;
            --slate-500:  #64748b;
            --slate-200:  #e2e8f0;
            --slate-100:  #f1f5f9;
            --white:      #ffffff;
            --radius-xl:  1.5rem;
            --radius-2xl: 2rem;
            --shadow-card: 0 4px 24px -4px rgba(0,0,0,.10), 0 2px 8px -2px rgba(0,0,0,.06);
            --shadow-btn:  0 4px 14px -2px rgba(0,151,156,.35);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #f0f9f9;
            color: var(--slate-900);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* decorative bg dots */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, #00979c22 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================================
           LAYOUT
        ============================================================ */
        #app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

        nav {
            background: var(--white);
            box-shadow: 0 1px 12px rgba(0,0,0,.07);
            position: sticky; top: 0; z-index: 100;
            padding: .75rem 1.25rem;
        }
        .nav-inner {
            max-width: 860px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            display: flex; align-items: center; gap: .6rem;
            cursor: pointer; text-decoration: none;
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem; color: var(--slate-900);
            user-select: none;
        }
        .logo span { color: var(--teal); }
        .logo-icon {
            width: 40px; height: 40px;
            background: var(--teal-light);
            border-radius: .75rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.35rem;
        }

        .nav-right { display: flex; align-items: center; gap: .75rem; }
        .counter-badge {
            background: var(--slate-100); color: var(--slate-500);
            font-weight: 800; font-size: .8rem;
            padding: .3rem .9rem; border-radius: 99px;
        }
        .btn-ghost {
            background: var(--slate-100); color: var(--slate-500);
            font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .85rem;
            border: none; cursor: pointer;
            padding: .4rem 1rem; border-radius: 99px;
            display: flex; align-items: center; gap: .4rem;
            transition: background .2s, color .2s;
        }
        .btn-ghost:hover { background: var(--teal-light); color: var(--teal-dark); }

        /* progress bar */
        #progress-bar-wrap {
            height: 6px; background: var(--slate-200); border-radius: 99px;
            margin-top: .6rem; overflow: hidden;
        }
        #progress-bar {
            height: 100%; background: linear-gradient(90deg, var(--teal), #00c9cf);
            border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1);
            width: 0%;
        }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1.5rem 1rem 0; }
        .view-wrap { max-width: 860px; width: 100%; }

        /* bottom controls */
        #bottom-bar {
            max-width: 860px; margin: 0 auto;
            padding: 1.25rem 1rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center; gap: 1rem;
        }
        .btn-nav {
            font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem;
            border: none; cursor: pointer;
            padding: .75rem 1.75rem; border-radius: 99px;
            display: flex; align-items: center; gap: .5rem;
            transition: all .2s;
        }
        .btn-prev {
            background: var(--white); color: var(--slate-500);
            border: 2px solid var(--slate-200);
        }
        .btn-prev:hover:not(:disabled) { border-color: var(--slate-400); color: var(--slate-700); }
        .btn-prev:disabled { opacity: .35; cursor: not-allowed; }
        .btn-next {
            background: var(--teal); color: white;
            box-shadow: var(--shadow-btn);
        }
        .btn-next:hover:not(:disabled) { background: var(--teal-dark); transform: translateY(-2px); }
        .btn-next:disabled { opacity: .4; cursor: not-allowed; }
        .btn-next.quiz-mode { background: var(--purple); box-shadow: 0 4px 14px -2px rgba(139,92,246,.35); }
        .btn-next.quiz-mode:hover:not(:disabled) { background: #7c3aed; }

        /* dot progress */
        #dot-progress { display: flex; align-items: center; gap: .4rem; }
        .dot {
            width: 10px; height: 10px; border-radius: 99px;
            background: var(--slate-200);
            transition: all .4s cubic-bezier(.4,0,.2,1);
        }
        .dot.active { width: 28px; background: var(--teal); }
        .dot.active.quiz-mode { background: var(--purple); }
        .dot.done { background: var(--green); }

        /* ============================================================
           ANIMATIONS
        ============================================================ */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounce   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes shake    { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-5px); } 40%,80% { transform: translateX(5px); } }
        @keyframes pop      { 0% { transform: scale(.8); opacity: 0; } 70% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes confetti { 0% { transform: translateY(-10px) rotate(0); opacity: 1; } 100% { transform: translateY(60px) rotate(360deg); opacity: 0; } }
        @keyframes pulse    { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }

        .anim-slideUp   { animation: slideUp .45s cubic-bezier(.4,0,.2,1) both; }
        .anim-fadeIn    { animation: fadeIn .35s ease both; }
        .anim-bounce    { animation: bounce 2s infinite; }
        .anim-pop       { animation: pop .4s cubic-bezier(.4,0,.2,1) both; }
        .anim-shake     { animation: shake .4s ease; }
        .anim-pulse     { animation: pulse 2.5s infinite; }

        /* ============================================================
           MENU VIEW
        ============================================================ */
        .menu-wrapper { text-align: center; padding: 1.5rem 0 2rem; }
        .mascot-big {
            font-size: 5rem;
            display: inline-block;
            filter: drop-shadow(0 8px 16px rgba(0,151,156,.25));
            margin-bottom: 1rem;
        }
        .menu-title {
            font-family: 'Fredoka One', cursive;
            font-size: 2.8rem; color: var(--slate-900);
            line-height: 1.1; margin-bottom: .5rem;
        }
        .menu-title span { color: var(--teal); }
        .menu-sub { color: var(--slate-500); font-size: 1.1rem; font-weight: 600; margin-bottom: 2rem; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; max-width: 600px; margin: 0 auto; }
        @media (max-width: 500px) { .menu-grid { grid-template-columns: 1fr; } }

        .menu-card {
            background: var(--white);
            border: 2.5px solid var(--slate-200);
            border-radius: var(--radius-2xl);
            padding: 2rem 1.5rem;
            cursor: pointer;
            transition: transform .25s, box-shadow .25s, border-color .25s;
            box-shadow: var(--shadow-card);
        }
        .menu-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 12px 32px -6px rgba(0,0,0,.14); }
        .menu-card:hover .card-icon-wrap { transform: scale(1.1); }
        .menu-card-class:hover { border-color: var(--teal); }
        .menu-card-quiz:hover  { border-color: var(--purple); }

        .card-icon-wrap {
            width: 72px; height: 72px; border-radius: var(--radius-xl);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; margin: 0 auto 1rem;
            transition: transform .25s;
        }
        .bg-class  { background: var(--teal-light); }
        .bg-quiz   { background: var(--purple-light); }
        .menu-card h3 {
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem; margin-bottom: .35rem; color: var(--slate-900);
        }
        .menu-card p { color: var(--slate-500); font-size: .95rem; line-height: 1.5; }

        .badge-count {
            display: inline-block; margin-top: .75rem;
            font-size: .75rem; font-weight: 800;
            padding: .2rem .75rem; border-radius: 99px;
        }
        .badge-teal   { background: var(--teal-light); color: var(--teal-dark); }
        .badge-purple { background: var(--purple-light); color: var(--purple); }

        /* ============================================================
           SLIDE / CARD LAYOUT
        ============================================================ */
        .slide-card {
            background: var(--white);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            border: 2px solid var(--slate-100);
        }
        .slide-header {
            padding: 1.25rem 1.75rem 1rem;
            border-bottom: 2px solid var(--slate-100);
            display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
        }
        .step-pill {
            font-size: .7rem; font-weight: 800; letter-spacing: .1em;
            text-transform: uppercase;
            padding: .25rem .85rem; border-radius: 99px;
            display: inline-block; margin-bottom: .5rem;
        }
        .slide-header h2 {
            font-family: 'Fredoka One', cursive;
            font-size: 1.85rem; line-height: 1.2; color: var(--slate-900);
        }
        .slide-header .subtitle { color: var(--slate-500); font-size: 1rem; font-weight: 600; margin-top: .25rem; }
        .slide-icon-box {
            width: 60px; height: 60px; border-radius: 1rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; flex-shrink: 0;
            background: var(--slate-100);
        }
        .slide-body { padding: 1.25rem 1.75rem 1.5rem; }

        /* color themes */
        .theme-teal   .step-pill   { background: var(--teal-light); color: var(--teal-dark); }
        .theme-teal   .slide-icon-box { background: var(--teal-light); }
        .theme-blue   .step-pill   { background: var(--blue-light); color: #1d4ed8; }
        .theme-blue   .slide-icon-box { background: var(--blue-light); }
        .theme-orange .step-pill   { background: var(--orange-light); color: #c2410c; }
        .theme-orange .slide-icon-box { background: var(--orange-light); }
        .theme-green  .step-pill   { background: var(--green-light); color: #15803d; }
        .theme-green  .slide-icon-box { background: var(--green-light); }
        .theme-dark   .step-pill   { background: var(--slate-900); color: var(--white); }
        .theme-dark   .slide-icon-box { background: #1e293b; }

        /* accent bar at top of card */
        .color-bar { height: 6px; width: 100%; }
        .bar-teal   { background: linear-gradient(90deg, var(--teal), #00c9cf); }
        .bar-blue   { background: linear-gradient(90deg, var(--blue), #60a5fa); }
        .bar-orange { background: linear-gradient(90deg, var(--orange), #fbbf24); }
        .bar-green  { background: linear-gradient(90deg, var(--green), #4ade80); }
        .bar-dark   { background: linear-gradient(90deg, #0f172a, #334155); }
        .bar-purple { background: linear-gradient(90deg, var(--purple), #c084fc); }

        /* ============================================================
           SLIDE CONTENT STYLES
        ============================================================ */
        /* Slide 1 — Intro */
        .intro-body { text-align: center; padding: 1.5rem 1rem; }
        .intro-icon {
            font-size: 5rem; display: inline-block;
            filter: drop-shadow(0 6px 14px rgba(0,151,156,.2));
            margin-bottom: 1rem;
        }
        .intro-text { font-size: 1.1rem; color: var(--slate-500); max-width: 480px; margin: 0 auto; line-height: 1.7; }
        .intro-text strong { color: var(--slate-900); }

        /* Slide 2 — Anatomy */
        .anatomy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 520px) { .anatomy-grid { grid-template-columns: 1fr; } }
        .anatomy-box {
            padding: 1.25rem; border-radius: var(--radius-xl); border: 2px solid;
        }
        .anatomy-setup { background: var(--blue-light); border-color: #93c5fd; }
        .anatomy-loop  { background: var(--purple-light); border-color: #c4b5fd; }
        .anatomy-box code {
            font-family: 'Courier New', monospace;
            font-size: 1rem; font-weight: 900;
            display: block; margin-bottom: .5rem;
        }
        .anatomy-setup code { color: #1d4ed8; }
        .anatomy-loop  code { color: var(--purple); }
        .anatomy-box h4 { font-weight: 800; color: var(--slate-900); margin-bottom: .35rem; }
        .anatomy-box p  { font-size: .92rem; color: var(--slate-700); line-height: 1.5; }
        .anatomy-tag {
            display: inline-block; margin-top: .5rem;
            font-size: .78rem; font-weight: 800;
            padding: .2rem .75rem; border-radius: 99px;
        }
        .tag-blue   { background: #bfdbfe; color: #1e40af; }
        .tag-purple { background: #ddd6fe; color: #5b21b6; }

        /* Slide 3 — Rules */
        .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
        @media (max-width: 520px) { .rules-grid { grid-template-columns: 1fr; } }
        .rule-card {
            background: var(--white); border: 2px solid var(--slate-200);
            border-radius: var(--radius-xl); padding: 1rem;
            display: flex; gap: .85rem; align-items: flex-start;
            transition: transform .2s, border-color .2s;
        }
        .rule-card:hover { transform: translateY(-3px); border-color: var(--orange); }
        .rule-symbol {
            width: 48px; height: 48px; border-radius: .75rem; flex-shrink: 0;
            background: var(--orange-light); color: var(--orange);
            font-weight: 900; font-size: 1.2rem; font-family: 'Courier New', monospace;
            display: flex; align-items: center; justify-content: center;
        }
        .rule-card h4 { font-weight: 800; color: var(--slate-900); margin-bottom: .2rem; font-size: .97rem; }
        .rule-card p  { font-size: .85rem; color: var(--slate-500); line-height: 1.5; }

        /* Slide 4 — Variables */
        .var-box {
            background: var(--green-light); border-left: 4px solid var(--green);
            border-radius: var(--radius-xl); padding: 1rem 1.25rem; margin-bottom: 1rem;
        }
        .var-box h4 { font-weight: 800; color: #15803d; display: flex; align-items: center; gap: .4rem; margin-bottom: .35rem; }
        .var-box p  { color: #166534; font-size: .95rem; line-height: 1.6; }
        .var-box code {
            display: inline-block; background: var(--white);
            font-family: 'Courier New', monospace; font-weight: 700;
            padding: .2rem .6rem; border-radius: .5rem;
            margin: .3rem 0; color: var(--slate-900);
        }
        .cmd-list { list-style: none; display: flex; flex-direction: column; gap: .6rem; }
        .cmd-item {
            display: flex; align-items: center; gap: .75rem;
            background: var(--white); border: 2px solid var(--slate-100);
            border-radius: var(--radius-xl); padding: .8rem 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,.04);
        }
        .cmd-item code {
            font-family: 'Courier New', monospace; font-weight: 700; font-size: .88rem; flex-shrink: 0;
        }
        .cmd-blue   code { color: var(--blue); }
        .cmd-green  code { color: var(--green); }
        .cmd-red    code { color: var(--red); }
        .cmd-purple code { color: var(--purple); }
        .arrow { color: var(--slate-300); flex-shrink: 0; }
        .cmd-desc { font-size: .85rem; color: var(--slate-500); line-height: 1.4; }

        /* Slide 5 — Code */
        .translate-btn {
            display: flex; align-items: center; gap: .5rem;
            font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .88rem;
            border: none; cursor: pointer;
            padding: .5rem 1.1rem; border-radius: 99px;
            transition: all .2s;
        }
        .translate-btn.mode-translate { background: #ecfdf5; color: #059669; }
        .translate-btn.mode-code      { background: #1e293b; color: #94a3b8; }
        .translate-btn:hover { transform: scale(1.04); }

        .code-block {
            background: #0f172a; border-radius: var(--radius-xl);
            padding: 1.25rem 1.5rem; font-family: 'Courier New', monospace;
            font-size: .88rem; line-height: 1.9; color: #94a3b8;
            position: relative; overflow: hidden;
        }
        .code-block::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 4px; background: var(--teal);
        }
        .tok-pink   { color: #f472b6; }
        .tok-green  { color: #86efac; }
        .tok-blue   { color: #7dd3fc; }
        .tok-orange { color: #fdba74; }
        .tok-gray   { color: #475569; font-style: italic; }
        .human-code { color: #4ade80; font-weight: 700; }

        /* ============================================================
           QUIZ STYLES
        ============================================================ */
        .quiz-q-num {
            width: 56px; height: 56px; border-radius: var(--radius-xl);
            background: var(--purple-light); color: var(--purple);
            font-family: 'Fredoka One', cursive; font-size: 1.6rem;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .quiz-question {
            font-family: 'Fredoka One', cursive;
            font-size: 1.45rem; color: var(--slate-900); line-height: 1.3;
        }
        .q-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.25rem; }

        .options-list { display: flex; flex-direction: column; gap: .7rem; }
        .option-btn {
            width: 100%; text-align: left; cursor: pointer;
            background: var(--slate-100); border: 2.5px solid var(--slate-200);
            border-radius: var(--radius-xl); padding: 1rem 1.25rem;
            font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .97rem;
            color: var(--slate-700); line-height: 1.4;
            transition: all .2s;
            display: flex; align-items: center; gap: .75rem;
        }
        .option-btn .opt-letter {
            width: 32px; height: 32px; border-radius: .6rem; flex-shrink: 0;
            background: var(--white); border: 2px solid var(--slate-300);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: .8rem; transition: all .2s;
        }
        .option-btn:hover:not(:disabled) {
            background: var(--purple-light); border-color: #c4b5fd; color: var(--purple);
        }
        .option-btn:hover:not(:disabled) .opt-letter { background: var(--purple); border-color: var(--purple); color: white; }
        .option-btn:disabled { cursor: not-allowed; }

        .option-btn.correct {
            background: var(--green-light); border-color: var(--green); color: #166534;
        }
        .option-btn.correct .opt-letter { background: var(--green); border-color: var(--green); color: white; }
        .option-btn.wrong {
            background: var(--red-light); border-color: var(--red); color: #991b1b;
        }
        .option-btn.wrong .opt-letter { background: var(--red); border-color: var(--red); color: white; }
        .option-btn.dimmed { opacity: .45; }

        .feedback-box {
            margin-top: 1rem; padding: .9rem 1.2rem;
            border-radius: var(--radius-xl); font-weight: 800;
            display: flex; align-items: center; gap: .6rem;
            font-size: 1rem;
        }
        .feedback-ok  { background: var(--green-light); color: #166534; border: 2px solid #86efac; }
        .feedback-err { background: var(--red-light);   color: #991b1b; border: 2px solid #fca5a5; }
        .feedback-icon { font-size: 1.4rem; }

        /* score bar */
        .score-bar {
            display: flex; align-items: center; gap: .75rem;
            background: var(--purple-light); border-radius: 99px;
            padding: .4rem .4rem .4rem .85rem;
        }
        .score-bar span { font-weight: 800; color: var(--purple); font-size: .88rem; }
        .score-stars { display: flex; gap: .15rem; font-size: .9rem; }

        /* ============================================================
           RESULT SCREEN
        ============================================================ */
        .result-screen { text-align: center; padding: 2rem 1rem 1.5rem; }
        .result-mascot { font-size: 5.5rem; display: inline-block; margin-bottom: .75rem; }
        .result-title {
            font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: var(--slate-900);
            margin-bottom: .4rem;
        }
        .result-sub { color: var(--slate-500); font-size: 1rem; font-weight: 600; margin-bottom: 1.5rem; }

        .score-display {
            display: inline-flex; align-items: center; gap: .6rem;
            background: var(--yellow-light); border: 2.5px solid var(--yellow);
            border-radius: var(--radius-xl); padding: .75rem 1.75rem;
            margin-bottom: 1.5rem;
        }
        .score-display .score-num {
            font-family: 'Fredoka One', cursive; font-size: 2.2rem; color: #92400e;
        }
        .score-display .score-label { font-size: .9rem; font-weight: 700; color: #92400e; }

        .result-stars { font-size: 2rem; letter-spacing: .2rem; margin-bottom: 1.5rem; }

        .result-btns { display: flex; justify-content: center; gap: .85rem; flex-wrap: wrap; }
        .btn-retry, .btn-go-class {
            font-family: 'Nunito', sans-serif; font-weight: 800;
            border: none; cursor: pointer; border-radius: 99px; padding: .8rem 1.8rem;
            font-size: 1rem; transition: all .2s;

        .btn-go-class { background: var(--slate-100); color: var(--slate-600); border: 2px solid var(--slate-200); }

        .hidden { display: none !important; }
        .flex-row { display: flex; }
        .items-center { align-items: center; }

</head>

<script>

/* ================================================================

                    <code>void setup() { }</code>
                    <h4>⚙️ La Preparación</h4>
                    <p>Le decimos al Arduino qué herramientas va a usar.<br>

                </div>

        `
    },
    {
        tema: 'orange', icono: '📏',
        titulo: 'Las 4 Reglas de Oro',
        sub: 'Si te equivocas, ¡el Arduino se confunde!',
        mascota: 'Las reglas del código son como la partitura de una canción — si cambias una nota, ¡la melodía suena rara! 🎵',
        html: `

                <div class="rule-card">

                    </div>

                        <h4>Los Comentarios</h4>

    },
    {

        html: `
            <div class="var-box">
                <h4>📦 ¿Qué es una Variable?</h4>

    {
        tema: 'dark', icono: '💻',
        titulo: '¡Tu Primer Código!',
        sub: 'Hagamos parpadear una luz LED.',
        mascota: 'Pulsa <strong>"Traducir a Humano"</strong> si el código se ve complicado — ¡te lo explico en español! 🌟',
        html: `
            <div style="display:flex;justify-content:flex-end;margin-bottom:.85rem">
                <button id="btn-traducir" class="translate-btn mode-translate" onclick="toggleCode()">
                    <span id="icon-traducir">🌐</span>

            </div>
            <div class="code-block">
                <div id="code-real">
<span class="tok-pink">int</span> led = <span class="tok-orange">13</span>; <span class="tok-gray">// Guardamos el número 13 en la variable 'led'</span>

<span class="tok-pink">void</span> <span class="tok-green">setup</span>() {
  <span class="tok-gray">// Preparamos el pin 13 para que envíe energía</span>
  <span class="tok-blue">pinMode</span>(led, <span class="tok-blue">OUTPUT</span>);
}

<span class="tok-pink">void</span> <span class="tok-green">loop</span>() {
  <span class="tok-blue">digitalWrite</span>(led, <span class="tok-blue">HIGH</span>); <span class="tok-gray">// ¡Se enciende la luz!</span>
  <span class="tok-blue">delay</span>(<span class="tok-orange">1000</span>);             <span class="tok-gray">// Espera 1 segundo</span>
  <span class="tok-blue">digitalWrite</span>(led, <span class="tok-blue">LOW</span>);  <span class="tok-gray">// ¡Se apaga la luz!</span>
  <span class="tok-blue">delay</span>(<span class="tok-orange">1000</span>);             <span class="tok-gray">// Espera 1 segundo y repite...</span>
}
                </div>
                <div id="code-humano" class="hidden human-code">
Cajita_Número  led  =  13 ;

Preparación_Inicial() {
  Configurar_Pin( led, ENVIAR_ENERGÍA );
}

Ciclo_Infinito() {
  Encender_Pin( led );
  Esperar( 1 segundo );
  Apagar_Pin( led );
  Esperar( 1 segundo );
}
                </div>
            </div>
        `
    }
];

/* ================================================================
   DATOS — QUIZ
================================================================ */
const QUIZ = [
    {
        pregunta: '¿Qué hace la parte del código llamada void setup()?',
        mascota: '💡 Piensa: ¿qué parte del programa se ejecuta solo una vez al inicio?',
        opciones: [
            { texto: 'Repite las instrucciones hasta el infinito, sin parar.', ok: false },
            { texto: 'Prepara las herramientas y se lee una sola vez al prender el Arduino.', ok: true },
            { texto: 'Apaga todas las luces del circuito automáticamente.', ok: false }
        ]
    },
    {
        pregunta: '¿Qué símbolo es obligatorio poner al final de casi todas las instrucciones en C++?',
        mascota: '🎵 Es como el silencio al final de una frase musical — sin él, la "canción" no cierra bien.',
        opciones: [
            { texto: 'Dos puntos  ( : )', ok: false },
            { texto: 'Un signo de interrogación  ( ? )', ok: false },
            { texto: 'Un punto y coma  ( ; )', ok: true }
        ]
    },
    {
        pregunta: 'Tienes un LED en el pin 8. ¿Qué comando le da energía para encenderlo?',
        mascota: '⚡ HIGH = alto = encendido = mucha energía. ¡Recuérdalo así!',
        opciones: [
            { texto: 'digitalWrite(8, LOW);', ok: false },
            { texto: 'digitalWrite(8, HIGH);', ok: true },

    },
    {

        opciones: [

            { texto: 'Como "cajitas con etiquetas" donde guardamos información.', ok: true }
        ]
    },
    {
        pregunta: 'Si escribes  //  antes de una frase en tu código, ¿qué hace el Arduino?',
        mascota: '🤫 Es como escribir en tinta invisible — solo tú lo ves, ¡el Arduino no!',
        opciones: [
            { texto: 'Se convierte en un comentario secreto y el Arduino lo ignora por completo.', ok: true },
            { texto: 'El Arduino lee la frase e intenta ejecutarla como un comando.', ok: false },
            { texto: 'El programa lanza un error rojo y deja de funcionar.', ok: false }
        ]
    }
];

/* ================================================================
   HELPERS
================================================================ */
let codigoHumano = false;

function toggleCode() {
    codigoHumano = !codigoHumano;
    document.getElementById('code-real').classList.toggle('hidden', codigoHumano);
    document.getElementById('code-humano').classList.toggle('hidden', !codigoHumano);
    const btn = document.getElementById('btn-traducir');
    const txt = document.getElementById('text-traducir');
    const ico = document.getElementById('icon-traducir');
    if (codigoHumano) {
        btn.className = 'translate-btn mode-code';
        txt.textContent = 'Ver Código C++';
        ico.textContent = '💻';
    } else {
        btn.className = 'translate-btn mode-translate';
        txt.textContent = 'Traducir a Humano';
        ico.textContent = '🌐';
    }
}

function spawnConfetti() {
    const colors = ['#00979C','#f97316','#8b5cf6','#22c55e','#fbbf24','#ef4444','#3b82f6'];
    for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = `
            left:${Math.random()*100}vw;
            top:${Math.random()*40+20}vh;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            transform:rotate(${Math.random()*360}deg);
            animation-delay:${Math.random()*0.5}s;
            animation-duration:${.8+Math.random()*0.8}s;
        `;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
    }
}

function estrellas(puntaje, total) {
    const pct = puntaje / total;
    if (pct === 1)   return '⭐⭐⭐';
    if (pct >= 0.6)  return '⭐⭐';
    return '⭐';
}

/* ================================================================
   RENDER — MENÚ
================================================================ */
function renderMenu() {
    document.getElementById('counter-badge').classList.add('hidden');
    document.getElementById('btn-menu').classList.add('hidden');
    document.getElementById('progress-bar-wrap').classList.add('hidden');
    document.getElementById('bottom-bar').classList.add('hidden');

    document.getElementById('view').innerHTML = `
        <div class="menu-wrapper anim-fadeIn">
            <div class="mascot-big anim-bounce">🤖</div>
            <h1 class="menu-title">¡Bienvenido a<br><span>RoboClase</span>!</h1>
            <p class="menu-sub">Elige tu misión de hoy para comenzar a programar.</p>
            <div class="menu-grid">
                <div class="menu-card menu-card-class" onclick="iniciar('clase')">
                    <div class="card-icon-wrap bg-class">📖</div>
                    <h3>Clase Introductoria</h3>
                    <p>Aprende qué es Arduino, cómo piensa y lee tus primeros códigos.</p>
                    <span class="badge-count badge-teal">5 lecciones</span>
                </div>
                <div class="menu-card menu-card-quiz" onclick="iniciar('quiz')">
                    <div class="card-icon-wrap bg-quiz">🎮</div>
                    <h3>Cuestionario</h3>
                    <p>¡Pon a prueba tu cerebro y demuestra que eres un experto!</p>
                    <span class="badge-count badge-purple">5 preguntas</span>
                </div>
            </div>
        </div>
    `;
}

/* ================================================================
   RENDER — SLIDE DE CLASE
================================================================ */
function renderClase() {
    const d = SLIDES[S.slide];
    const total = SLIDES.length;

    // nav
    document.getElementById('counter-badge').textContent = `${S.slide+1} / ${total}`;
    document.getElementById('counter-badge').classList.remove('hidden');
    document.getElementById('btn-menu').classList.remove('hidden');
    document.getElementById('progress-bar-wrap').classList.remove('hidden');
    document.getElementById('progress-bar').style.width = `${((S.slide+1)/total)*100}%`;

    // bottom bar
    const bb = document.getElementById('bottom-bar');
    bb.classList.remove('hidden');
    const prev = document.getElementById('btn-prev');
    const next = document.getElementById('btn-next');
    prev.disabled = S.slide === 0;
    next.className = 'btn-nav btn-next';
    next.textContent = S.slide === total-1 ? '✅ ¡Terminar!' : '¡Siguiente! →';

    // dots
    let dots = '';
    for(let i=0;i<total;i++){
        const cls = i===S.slide ? 'dot active' : (i<S.slide ? 'dot done' : 'dot');
        dots += `<div class="${cls}"></div>`;
    }
    document.getElementById('dot-progress').innerHTML = dots;

    // card
    codigoHumano = false;
    document.getElementById('view').innerHTML = `
        <div class="slide-card theme-${d.tema} anim-slideUp">
            <div class="color-bar bar-${d.tema}"></div>
            <div class="slide-header">
                <div>
                    <span class="step-pill">PASO ${S.slide+1}</span>
                    <h2>${d.titulo}</h2>
                    <p class="subtitle">${d.sub}</p>
                </div>
                <div class="slide-icon-box">${d.icono}</div>
            </div>
            <div class="slide-body">
                <div class="mascot-bubble">
                    <div class="mascot-avatar">🤖</div>
                    <div class="mascot-text">${d.mascota}</div>
                </div>
                ${d.html}
            </div>
        </div>
    `;
}

/* ================================================================
   RENDER — PREGUNTA DE QUIZ
================================================================ */
function renderQuiz() {
    const q = QUIZ[S.slide];
    const total = QUIZ.length;
    S.respondido = false;

    // nav
    document.getElementById('counter-badge').textContent = `${S.slide+1} / ${total}`;
    document.getElementById('counter-badge').classList.remove('hidden');
    document.getElementById('btn-menu').classList.remove('hidden');
    document.getElementById('progress-bar-wrap').classList.remove('hidden');
    document.getElementById('progress-bar').style.width = `${((S.slide+1)/total)*100}%`;

    // bottom bar
    const bb = document.getElementById('bottom-bar');
    bb.classList.remove('hidden');
    const prev = document.getElementById('btn-prev');
    const next = document.getElementById('btn-next');
    prev.disabled = S.slide === 0;
    next.disabled = true;
    next.className = 'btn-nav btn-next quiz-mode';
    next.textContent = S.slide === total-1 ? '🏆 Ver resultado' : '¡Siguiente! →';

    // dots
    let dots = '';
    for(let i=0;i<total;i++){
        const cls = i===S.slide ? 'dot active quiz-mode' : (i<S.slide ? 'dot done' : 'dot');
        dots += `<div class="${cls}"></div>`;
    }
    document.getElementById('dot-progress').innerHTML = dots;

    // shuffle options
    const opts = [...q.opciones].sort(()=>Math.random()-.5);
    const letters = ['A','B','C'];
    let optsHTML = opts.map((op, i) => `
        <button class="option-btn" onclick="responder(this, ${op.ok})" data-ok="${op.ok}">
            <div class="opt-letter">${letters[i]}</div>
            ${op.texto}
        </button>
    `).join('');

    document.getElementById('view').innerHTML = `
        <div class="slide-card anim-slideUp">
            <div class="color-bar bar-purple"></div>
            <div class="slide-header">
                <div class="q-header">
                    <div class="quiz-q-num">${S.slide+1}</div>
                    <p class="quiz-question">${q.pregunta}</p>
                </div>
            </div>
            <div class="slide-body">
                <div class="mascot-bubble">
                    <div class="mascot-avatar">🤖</div>
                    <div class="mascot-text">${q.mascota}</div>
                </div>
                <div class="options-list" id="opts">
                    ${optsHTML}
                </div>
                <div id="feedback" class="hidden"></div>
            </div>
        </div>
    `;
}

/* ================================================================
   LÓGICA QUIZ — RESPONDER
================================================================ */
function responder(btn, esOk) {
    if (S.respondido) return;
    S.respondido = true;
    if (esOk) S.puntaje++;

    // deshabilitar todos
    document.querySelectorAll('.option-btn').forEach(b => {
        b.disabled = true;
        if (b.dataset.ok === 'true') {
            b.classList.add('correct');
        } else if (b === btn && !esOk) {
            b.classList.add('wrong', 'anim-shake');
        } else {
            b.classList.add('dimmed');
        }
    });

    // feedback
    const fb = document.getElementById('feedback');
    fb.className = esOk ? 'feedback-box feedback-ok anim-pop' : 'feedback-box feedback-err anim-pop';
    fb.innerHTML = esOk
        ? '<span class="feedback-icon">🎉</span> ¡Excelente! Respuesta correcta.'
        : '<span class="feedback-icon">😬</span> ¡Ups! Esa no era — mira la respuesta correcta en verde.';

    // habilitar siguiente
    document.getElementById('btn-next').disabled = false;
}

/* ================================================================
   RENDER — RESULTADO
================================================================ */
function renderResultado() {
    document.getElementById('counter-badge').classList.add('hidden');
    document.getElementById('progress-bar-wrap').classList.add('hidden');
    document.getElementById('bottom-bar').classList.add('hidden');

    const total = QUIZ.length;
    const p = S.puntaje;
    const pct = p / total;
    const st = estrellas(p, total);
    const [mascot, titulo, sub] =
        pct === 1   ? ['🏆', '¡Perfecto! ¡Genio total!',       'Respondiste todo correcto. ¡Eres un crack del código!']
        : pct >= .6 ? ['😎', '¡Muy bien hecho!',               'Vas por muy buen camino. ¡Sigue practicando!']
        :             ['💪', '¡Sigue intentando!',             'No te rindas — repasa la clase y vuelve a intentarlo.'];

    if (pct >= .6) spawnConfetti();

    document.getElementById('btn-menu').classList.remove('hidden');

    document.getElementById('view').innerHTML = `
        <div class="slide-card anim-slideUp">
            <div class="color-bar bar-purple"></div>
            <div class="result-screen">
                <div class="result-mascot anim-bounce">${mascot}</div>
                <h2 class="result-title">${titulo}</h2>
                <p class="result-sub">${sub}</p>
                <div class="score-display">
                    <span class="score-num">${p}/${total}</span>
                    <span class="score-label">respuestas<br>correctas</span>
                </div>
                <div class="result-stars">${st}</div>
                <div class="result-btns">
                    <button class="btn-retry" onclick="iniciar('quiz')">🔄 Volver a intentar</button>
                    <button class="btn-go-class" onclick="iniciar('clase')">📖 Repasar la clase</button>
                </div>
            </div>
        </div>
    `;
}

/* ================================================================
   NAVEGACIÓN
================================================================ */
function irAlMenu() {
    S.vista = 'menu';
    renderMenu();
}

function iniciar(modo) {
    S.vista = modo;
    S.slide = 0;
    S.puntaje = 0;
    S.respondido = false;
    if (modo === 'clase')     renderClase();
    else if (modo === 'quiz') renderQuiz();
}

function navegar(dir) {
    const total = S.vista === 'clase' ? SLIDES.length : QUIZ.length;
    const sig = S.slide + dir;
    if (sig < 0) return;
    if (sig >= total) {
        // terminar
        if (S.vista === 'clase') irAlMenu();
        else { S.vista = 'resultado'; renderResultado(); }
        return;
    }
    S.slide = sig;
    if (S.vista === 'clase')     renderClase();
    else if (S.vista === 'quiz') renderQuiz();
}

/* ================================================================
   INIT
================================================================ */
renderMenu();
</script>
