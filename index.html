    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background-color: #f0f4f8;
            overflow-x: hidden;
        }

        /* --- Animaciones Generales --- */
        .slide-enter { animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-hover:hover {
            transform: translateY(-5px) scale(1.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* --- Animaciones de Actuadores --- */
        .hover-spin:hover i { animation: spin 2s linear infinite; }
        .hover-glow:hover i { filter: drop-shadow(0 0 8px #eab308); color: #eab308; }
        .hover-shake:hover i { animation: shake 0.5s infinite; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px) rotate(-5deg); }
            75% { transform: translateX(3px) rotate(5deg); }
        }

        /* --- Animaciones del Test --- */
        .shake-error { animation: shake-error-anim 0.4s ease-in-out; }
        @keyframes shake-error-anim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        /* --- Efectos Especiales --- */
        .pulse-brain { animation: pulse-soft 2s infinite; }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        /* --- Clases Utilitarias --- */
        .bg-robot-blue { background-color: #3b82f6; }
        .text-robot-blue { color: #3b82f6; }
        .oculto { display: none !important; }
    </style>
</head>

                                    <button class="opcion-test p-3 bg-slate-50 border border-slate-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 transition-colors font-medium text-slate-600 flex flex-col items-center justify-center gap-2" data-correcta="false"><i data-lucide="mouse-pointer-2" class="w-6 h-6"></i> Pulsador</button>
                                    <button class="opcion-test p-3 bg-slate-50 border border-slate-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 transition-colors font-medium text-slate-600 flex flex-col items-center justify-center gap-2" data-correcta="false"><i data-lucide="sun" class="w-6 h-6"></i> Sensor de Luz</button>
                                    <button class="opcion-test p-3 bg-slate-50 border border-slate-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 transition-colors font-medium text-slate-600 flex flex-col items-center justify-center gap-2" data-correcta="true" data-explicacion="¡Magia pura! Arduino es el cerebro que dirige todo."><i data-lucide="cpu" class="w-6 h-6"></i> Arduino</button>
                                </div>
                                <div class="feedback-test oculto mt-3 text-sm font-bold p-3 rounded-lg"></div>
                            </div>

                        </div>
                    </div>
                `
            }
        ];

        // =====================================================================
        // 3. RENDERIZADO E INTERFAZ (UI)
        // =====================================================================
        
        function renderizarSlide() {
            const slide = diapositivas[estado.slideActual];
            const contenedor = document.getElementById('contenedor-contenido');
            
            document.getElementById('contador-slides').innerText = `${estado.slideActual + 1} / ${diapositivas.length}`;

            // Reiniciar animación del slide
            contenedor.classList.remove('slide-enter');
            void contenedor.offsetWidth; // Forzar repintado del DOM para reiniciar animación
            contenedor.classList.add('slide-enter');

            // Inyectar HTML
            contenedor.innerHTML = `
                <div class="h-3 w-full ${slide.color}"></div>
                <div class="p-6 md:p-8 border-b border-slate-100 flex justify-between items-start">
                    <div>
                        <span class="inline-block px-4 py-1 rounded-full text-xs font-bold tracking-widest mb-3 ${slide.color} text-white shadow-sm">
                            PASO ${estado.slideActual + 1}
                        </span>
                        <h2 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-2">${slide.titulo}</h2>
                        <p class="text-slate-500 text-lg font-medium">${slide.subtitulo}</p>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm hidden md:block">
                        <i data-lucide="${slide.icono}" class="w-10 h-10 text-slate-400"></i>
                    </div>
                </div>
                <div class="flex-grow flex flex-col justify-center">
                    ${slide.contenido}
                </div>
            `;

            // Reseteamos el estado de traducción visual si cambiamos de slide
            estado.codigoTraducido = false;

            renderizarPuntosProgreso();
            actualizarBotonesNavegacion();
            lucide.createIcons(); // Recargar iconos de Lucide
        }

        function renderizarPuntosProgreso() {
            const contenedor = document.getElementById('puntos-progreso');
            contenedor.innerHTML = diapositivas.map((_, index) => `
                <div class="h-2.5 rounded-full transition-all duration-500 ${index === estado.slideActual ? 'w-10 bg-robot-blue shadow-sm' : 'w-2.5 bg-slate-200'}"></div>
            `).join('');
        }

        function actualizarBotonesNavegacion() {
            const btnPrev = document.getElementById('btn-atras');
            const btnSig = document.getElementById('btn-avanzar');
            
            btnPrev.disabled = estado.slideActual === 0;
            
            if (estado.slideActual === diapositivas.length - 1) {
                btnSig.innerHTML = '¡Reiniciar Misión! <i data-lucide="rotate-ccw"></i>';
                btnSig.className = "w-full sm:w-auto flex justify-center items-center gap-2 px-8 py-3 bg-yellow-500 text-white rounded-full font-bold hover:bg-yellow-600 shadow-lg shadow-yellow-300 hover:shadow-yellow-400 transition-all transform hover:-translate-y-0.5";
            } else {
                btnSig.innerHTML = '¡Avanzar! <i data-lucide="arrow-right"></i>';
                btnSig.className = "w-full sm:w-auto flex justify-center items-center gap-2 px-8 py-3 bg-robot-blue text-white rounded-full font-bold hover:bg-blue-600 shadow-lg shadow-blue-300 hover:shadow-blue-400 transition-all transform hover:-translate-y-0.5";
            }
        }

        // =====================================================================
        // 4. LÓGICA E INTERACTIVIDAD (Eventos)
        // =====================================================================
        
        function configurarEventos() {
            // Navegación
            document.getElementById('btn-avanzar').addEventListener('click', () => {
                if (estado.slideActual < diapositivas.length - 1) {
                    estado.slideActual++;
                } else {
                    estado.slideActual = 0; // Reiniciar
                }
                renderizarSlide();
            });

            document.getElementById('btn-atras').addEventListener('click', () => {
                if (estado.slideActual > 0) {
                    estado.slideActual--;
                    renderizarSlide();
                }
            });

            // Delegación de eventos para el contenido dinámico del slide
            document.getElementById('contenedor-contenido').addEventListener('click', (e) => {
                
                // Evento: Revelar secreto de Arduino (Slide 2)
                const btnArduino = e.target.closest('#btn-revelar-arduino');
                if (btnArduino) {
                    document.getElementById('secreto-arduino').classList.remove('oculto');
                    btnArduino.classList.add('oculto');
                }

                // Evento: Botón Traducir Código (Slide 6)
                const btnTraducir = e.target.closest('#btn-traducir');
                if (btnTraducir) {
                    estado.codigoTraducido = !estado.codigoTraducido;
                    const real = document.getElementById('codigo-real');
                    const humano = document.getElementById('codigo-humano');
                    const spanTexto = btnTraducir.querySelector('span');
                    
                    if (estado.codigoTraducido) {
                        real.classList.add('oculto');
                        humano.classList.remove('oculto');
                        spanTexto.textContent = 'Ver Código C++';
                        btnTraducir.classList.replace('bg-emerald-500', 'bg-slate-700');
                        btnTraducir.classList.replace('hover:bg-emerald-600', 'hover:bg-slate-600');
                        btnTraducir.querySelector('i').setAttribute('data-lucide', 'code');
                    } else {
                        real.classList.remove('oculto');
                        humano.classList.add('oculto');
                        spanTexto.textContent = 'Traducir a Humano';
                        btnTraducir.classList.replace('bg-slate-700', 'bg-emerald-500');
                        btnTraducir.classList.replace('hover:bg-slate-600', 'hover:bg-emerald-600');
                        btnTraducir.querySelector('i').setAttribute('data-lucide', 'languages');
                    }
                    lucide.createIcons();
                }

                // Evento: Opciones del Mini Reto (Slide 7)
                const btnOpcion = e.target.closest('.opcion-test');
                if (btnOpcion && !btnOpcion.disabled) {
                    const contenedorOpciones = btnOpcion.closest('.contenedor-opciones');
                    const feedback = contenedorOpciones.nextElementSibling;
                    const esCorrecta = btnOpcion.getAttribute('data-correcta') === 'true';

                    // Deshabilitar botones de esta pregunta para evitar múltiples respuestas
                    const botones = contenedorOpciones.querySelectorAll('.opcion-test');
                    botones.forEach(btn => {
                        btn.disabled = true;
                        btn.classList.remove('hover:bg-blue-50', 'hover:border-blue-300', 'cursor-pointer');
                        btn.classList.add('opacity-40', 'cursor-not-allowed');
                    });

                    // Mantener el botón clickeado visible
                    btnOpcion.classList.remove('opacity-40');

                    feedback.classList.remove('oculto');

                    if (esCorrecta) {
                        // Estilos de éxito
                        btnOpcion.classList.replace('bg-slate-50', 'bg-green-100');
                        btnOpcion.classList.replace('border-slate-200', 'border-green-500');
                        btnOpcion.classList.replace('text-slate-600', 'text-green-800');
                        
                        feedback.innerHTML = `<i data-lucide="check-circle" class="inline w-5 h-5 mr-1"></i> ${btnOpcion.getAttribute('data-explicacion')}`;
                        feedback.className = "feedback-test mt-3 text-sm font-bold p-3 rounded-lg bg-green-50 text-green-700 flex items-center slide-enter border border-green-200";
                    } else {
                        // Estilos de error
                        btnOpcion.classList.replace('bg-slate-50', 'bg-red-100');
                        btnOpcion.classList.replace('border-slate-200', 'border-red-500');
                        btnOpcion.classList.replace('text-slate-600', 'text-red-800');
                        btnOpcion.classList.add('shake-error');
                        
                        feedback.innerHTML = `<i data-lucide="x-circle" class="inline w-5 h-5 mr-1"></i> ¡Ups! Esa no es la pieza correcta. Intenta recordar la clase.`;
                        feedback.className = "feedback-test mt-3 text-sm font-bold p-3 rounded-lg bg-red-50 text-red-700 flex items-center slide-enter border border-red-200";
                    }
                    lucide.createIcons();
                }
            });
        }

        // =====================================================================
        // 5. INICIALIZACIÓN
        // =====================================================================
        window.onload = () => {
            configurarEventos();
            renderizarSlide();
        };
    </script>
</body>
</html>
